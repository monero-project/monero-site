accepting:
  title_gui: 圖形界面的說明
  index: 索引
  gui1: "使用圖形界面接受付款非常簡單。无论您是商戶還是用戶，您都有两個可用頁面：接收和商戶。"
  gui2: 接收頁面（如下所示）的詳細說明
  guilinkguide: 在圖形界面指南中。
  guiinstructions: >
    要接收 XMR，您只需向付款人提供一個 @address，他們可以將資金發送到该地址。大多数情况下，只需分享二維碼并讓付款人掃描，而不是復制粘贴字母數字字符串更容易。
    使用圖形界面，每個生成的地址都带有二維碼。讓對方用手机上的門羅幣 @wallet 掃描二維碼，几分鐘内接收您的 XMR。
    請記住，您可以生成任意数量的地址（子地址）。如果您出于任何原因想要將資金分开，這很有用。
  guimerchant: 商戶可能會发現使用"商戶"頁面（下面的截圖）更方便，该頁面在
  guilinkguide1: 上述鏈接指南
  guimerchant1: >
    這是一個类似 POS 的頁面，商戶可以轻松使用來設置要接收的 XMR 金额。如果启用了"销售跟踪器"选项，
    您將實時看到付款到達您的錢包，以及確認数量。
  guisteps: "這两個頁面讓每個人都可以通過以下步骤轻松接收 XMR："
  guiol: "转到「接收」頁面并創建/選擇您想要接收币的地址。"
  guiol1: 與您想要接收币的人分享由字母和數字組成的地址。您可能更喜欢使用更用戶友好的二維碼。
  guiol2: "如果您想指定要接收的金额，請转到「商戶」頁面（在「接收」頁面中選擇將用于接收 XMR 的 @account 后）。"
  guiol3: "插入要接收的金额，然后與付款人分享付款 URL 或二維碼。如果您想實時跟踪付款，請勾选「启用销售跟踪器」选项。"
  guiol4: 等待付款到達并有足够的確認（確認越多，交易越安全。您至少需要 10 次確認才能使用資金）。
  cliinstructions: 命令行的說明
  clicreatewallet: >
    当您第一次創建錢包時，會自动向您顯示一個 @address。這是您的主地址。
    如果您愿意，您可以簡單地使用该地址接收付款。您應該关心谁知道此地址（因為不同位置的一個地址可以关联），
    但您不需要担心區塊鏈觀察者像比特币一样觀察此地址的交易。朋友可以向同一地址發送交易而不會降低隱私。
  cliaccounts: >
    如果您愿意，您可以有更多控制权。門羅幣提供了創建多個賬戶的可能性，每個賬戶包含多個子地址，
    如果您想控制多個賬戶，這很有用。例如，您可能想要一個 @account 用于接收捐贈，另一個用于日常使用。
    這將允许您轻松监控"捐贈"賬戶的資金流入，而不會與您的主賬戶混淆。
  clicreateaccount: "要創建賬戶，只需運行此命令："
  clicreateaccount1: 現在您有了另一個與主賬戶分开的賬戶。您可以随時在賬戶之间切换。
  cliindex: >
    如您從上圖中看到的，每個賬戶都有一個索引號，您可以使用命令
    `account switch [index]` 在賬戶之间切换。例如，使用上圖作為參考，如果您想切换到"捐贈"賬戶來监控它，
    您可以通過给您的 CLI 此命令 `account switch 1` 來實現。現在您在您的"捐贈"賬戶上，可以立即开始使用它。
  cliindex1: >
    每個賬戶可以托管几乎无限数量的子地址。它們的工作方式與普通地址完全相同，您可以創建任意数量
    并使用它們接收 XMR 到它們鏈接的賬戶。要為賬戶創建新的子地址，請使用命令：
  clinotes: >
    請注意，下面的說明只是創建和使用賬戶/子地址所需的最低限度。
    CLI 提供了更精细的方式來處理賬戶和一般錢包。使用"help"命令列出所有可用选项。
  merchantstitle: 商戶說明
  merchantsreceive: 如果您是企業，希望以編程方式接收 @transactions 或使用多重签名等高级功能，建議查閱
  merchdevguides: 開發者指南
  merchantsreceive1: "如果您需要支持，社區將始终乐意提供幫助。來 #monero 聊天，聊天室在 Freenode 上，但也中繼到 MatterMost 和 Matrix。"
  merchantsint: "如果您不想直接處理錢包，可以使用第三方支付系統。門羅幣社區成员為各种平台和語言創建了一套集成。您可以在"
  merchantsintlink: GitHub 組织上找到更多信息
  merchantsthirdp: 如果您正在寻找其他第三方集成系統，
  merchthirdlink: 工具頁面上有支付网关列表
  merchantsthirdp1: 其中一些提供了不錯的功能，如自动將部分收入转换為法定貨幣或接受其他加密貨幣以及門羅幣的可能性。

contributing:
  intro: 門羅幣是一個開源的、社區驱动的項目。以下描述了支持该項目的几种方式。
  network: 支持網絡
  develop: 開發
  developp: "門羅幣是開源且无需许可的；欢迎并鼓励貢獻者。開發者可以通過多种方式為不同項目做出貢獻："
  cli: "CLI 錢包和守護進程："
  cli_p: 核心錢包，主要用 C++ 編寫。
  gui: "GUI 錢包："
  gui_p: 主要是 QML 和 C++。
  website: "本網站："
  website_p: 使用 Jekyll 構建。无 Javascript。
  bug: "漏洞和脆弱性狩猎：門羅幣在 Hackerone 上列出，開發者被要求负责任地披露漏洞和脆弱性。請參见"
  discl: 門羅幣項目脆弱性響应流程。
  develop_descr: >
    此列表仅包括核心團隊管理的工具，但門羅幣生態系統要广泛得多。人們可以為库、服務、文檔、圖形等的開發做出貢獻。列表實际上是无限的。聯繫或加入您想要貢獻的工作組。
  develop_wg: 查看門羅幣工作組。
  full-node: 運行節點
  full-node_p: 幫助門羅幣網絡的一种簡單有效的方式是運行 @node。節點確保網絡保持安全和去中心化運行。一個簡單的完全同步節點足以幫助網絡，但如果您想做得更多，您可以運行开放的 @remote-node，以允许其他人連接到它。
  full-node_p2: "我們有几份指南可以幫助您運行和配置節點："
  allguides: 查看所有用戶指南。
  mine: 挖礦
  mine_p: >
    挖礦確保網絡的安全。門羅幣使用 @randomx，一种由門羅幣貢獻者開發的抗 ASIC 算法，旨在保持可由普通消费级硬件挖掘。有关挖礦的更多信息，請參见
  mine_link: 專门的挖礦頁面。
  ffs: 社區众筹系統
  ccs_p: 門羅幣利用社區众筹系統，通過该系統提出開發項目并由社區资助。資金托管，一旦達到編程里程碑，就會向開發者汇款。任何人都可以生成新提案或资助現有提案。
  ccsbutton: 前往 CCS
  donate: 捐贈
  donate_p: 向一般基金的捐贈在紧急情况或需要時使用。基础設施成本目前由贊助商覆盖。
  genfund: 一般基金
  genfund_p: "您可以捐贈門羅幣和比特币："
  donate-other: 其他
  donate-other_para1: 電子郵件
  donate-other_para2: 获取其他捐贈方式或如果您想成為門羅幣項目的贊助商。
  supportdev: 支持開發者
  supportdev_p: 致力于門羅幣的開發者大多是獨立志愿者，但其中一些可能通過 CCS 提案獲得資金。如果您希望通過捐贈一些 XMR 來支持他們的努力，請考虑直接聯繫他們或使用打赏服務。
  supportdev_p2: 您可以在
  supportdev_link: 門羅幣的 OpenHub 頁面上找到直接貢獻或曾經貢獻过門羅幣仓库的人员概覽（以及其他有用的统計数据）
  sponsor: 贊助
  sponsor_p: 您也可以通過贊助計划支持門羅幣。請參见專门的
  sponsor_link: 贊助頁面
  sponsor_p2: 了解更多信息。
