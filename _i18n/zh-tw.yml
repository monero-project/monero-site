  monerosupport: 專门幫助門羅幣用戶的 subreddit。基本上是社區成员互相幫助。使用搜索选项。
  monerohow: "旧的知名資源，有大量指南和使用方法"
  qword: "'[技術词汇]'是什么意思？"
  aword: "門羅幣中使用的术语可能相当複雜，為此我們有"
  aword1: "您經常看到的术语及其解释的综合列表。如果您不知道一個词的含义或想要更多相关信息，只需訪問門羅幣百科。一些經常搜索的术语示例：@node、@fungibility、@view-key、@pruning。"
  qcontribute: 我如何貢獻？
  acontribute: "門羅幣是一個開源社區項目。這意味着没有公司在運营它，也没有 CEO 雇佣人员。一切都由志愿者或社區资助的貢獻者構建，他們將時间奉献给項目。有很多方式可以貢獻："
  acontribute1: 翻譯。這很容易，任何會說英语以外語言的人都可以幫助。翻譯主要发生在
  acontribute2: "聯繫工作組。門羅幣中几乎所有事情都由工作組管理，工作組是致力于開發某些特定方面的貢獻者群體（通常由协调员领导）。一些例子包括：本地化工作組（翻譯）、社區工作組、GUI 工作組、外联工作組等。工作組大多是獨立的，有自己的結構。聯繫您感兴趣的工作組并询问如何幫助。有关聯繫方式列表，請參见"
  acontribute3: 做您最擅长的事。您是設計师吗？創建門羅幣相关圖像并到处傳播。您是作家吗？撰寫關於門羅幣的文章。唯一的限制是您的想象力。找到您喜欢做的事并為門羅幣做！
  acontribute4: "外联工作組寫了一篇有用的文章來幫助新人："
  q1: 門羅幣為什么有价值？
  a1: 門羅幣有价值是因為人們愿意購買它。如果没有人愿意購買門羅幣，那么它就不會有任何价值。如果需求超过供应，門羅幣的價格就會上涨；如果供应超过需求，價格就會下跌。
  q2: 如何獲得門羅幣？
  a2: 您可以從交易所或個人那里購買門羅幣。交易所是購買門羅幣最常见的方式；大多数司法管辖区都有合规的交易所。一些錢包包含功能，可以轻松用法幣或其他加密貨幣購買門羅幣。或者，您可以尝试挖掘門羅幣以從 @block 奖励中獲得币。
  a2exchanges: "过去，您需要比特币才能購買門羅幣，但現在不再是這样。您可以在许多交易所直接用国家貨幣（美元、歐元、英镑等）或其他加密貨幣交易門羅幣。有些需要 KYC（身份證明）；其他的不需要，如去中心化交易所。本網站上有一個可以購買/出售門羅幣（XMR）的交易所列表："
  q3: 為什么助記词很重要？
  a3: "@mnemonic-seed 是一組 25 個單词，可用于在任何地方恢復您的賬戶。請妥善保管這些單词，不要與其他人分享。您可以使用此种子恢復您的賬戶，即使您的計算機崩溃了。"
  q4: 門羅幣的隱私與其他币有何不同？
  a4: "門羅幣使用三种不同的隱私技術：@ring-signatures、环机密交易（@RingCT）和 @stealth-addresses。這些分别隐藏 @transaction 中的發送方、金额和接收方。網絡上的所有交易都是強制私密的；没有办法意外發送透明交易。此功能是門羅幣獨有的。您不需要信任任何其他人來保護您的隱私。"
  q5: 為什么我的錢包同步需要這么长時间？
  a5: 如果您在本地運行完整的 @node，您需要將整個 @blockchain 復制到您的計算機上。這可能需要很长時间，尤其是在旧硬盘或慢速互联网連接上。如果您使用 @remote-node，您的計算機仍然需要請求所有输出的副本，這可能需要几個小時。請耐心等待，如果您愿意為更快的同步時间牺牲一些隱私，請考虑使用遠程節點或轻量级 @wallet。
  q6: 轻錢包和普通錢包有什么区别？
  a6: 對于轻錢包，您將查看密鑰提供给節點，節點會代表您掃描區塊鏈并查找您賬戶的傳入交易。此節點會知道您何時收到钱，但不會知道您收到了多少、從谁那里收到的或您要發送给谁。根据您的錢包軟件，您可能能夠使用您控制的節點以避免隱私泄露。為了更多隱私，請使用普通錢包，它可以與您自己的節點一起使用。
  q7: 門羅幣與比特币有何不同？
  a7: 門羅幣不是基于比特币的。它基于 CryptoNote 協議。比特币是一個完全透明的系統，人們可以准確看到從一個用戶發送到另一個用戶的金额。門羅幣隐藏此信息以保護所有交易中的用戶隱私。它還具有动態 @block 大小和动態費用、抗 ASIC 的工作量證明（@randomx）和 @tail-emission，以及其他几项變化。
  q8: 門羅幣有区块大小限制吗？
  a8: 不，門羅幣没有硬 @block 大小限制。相反，区块大小可以根据需求随時间增加或減少。它被限制在一定的增长率内以防止过度增长（@scalability）。
  q11: 什么是可互换性，為什么它很重要？
  a11: "@Fungibility 是貨幣的一個簡單属性，即相同价值的两個金额之间没有区别。如果两個人交换一张 10 元和两张 5 元，那么没有人會吃亏。然而，假設每個人都知道那张 10 元之前用于勒索軟件攻击。另一個人還會進行交易吗？可能不會，即使持有 10 元的人與勒索軟件没有聯繫。這是一個問題，因為接收金钱的人需要不断檢查他們收到的钱，以免最终得到被污染的币。門羅幣具有可互换性，這意味着人們不需要經历這种努力。"
  q12: 如果門羅幣如此私密，我們如何知道它們不是凭空创造的？
  a12-1: 在門羅幣中，每個 @transaction 输出都與一個密鑰镜像唯一关联，该密鑰镜像只能由该输出的持有者生成。被使用多次的密鑰镜像會被礦工作為双重支付拒绝，無法添加到有效的 @block 中。当收到新交易時，礦工會驗證密鑰镜像之前是否已存在于之前的交易中，以確保它不是双重支付。
  a12-2: 我們還可以知道交易金额是有效的，即使您花费的输入值和您發送的输出值是加密的（這些對除接收者之外的所有人都是隐藏的）。因為金额使用 @Pedersen-commitments 加密，這意味着没有觀察者可以知道输入和输出的金额，但他們可以對 Pedersen 承诺進行数学運算，以確定没有門羅幣凭空创造。
  a12-3: 只要您創建的加密输出金额等于正在花费的输入總和（包括接收者的输出和返回给您自己的找零输出以及未加密的交易费），那么您就有一個合法的交易，并且知道没有門羅幣凭空创造。Pedersen 承诺意味着總和可以被驗證為相等，但總和的門羅幣价值以及單獨的输入和输出的門羅幣价值是無法確定的。
  aabout-auditability: 關於供应可審計性的更多信息
  adetailed-auditability: 供应可審計性的深入分析
  q13: 門羅幣是魔法，无论我做什么都能保護我的隱私吗？
  a13: 門羅幣不是魔法。如果您使用門羅幣但將您的姓名和地址告诉另一方，另一方不會神奇地忘記您的姓名和地址。如果您泄露了您的密鑰，其他人會知道您做了什么。如果您受到攻击，其他人將能夠記录您的按键。如果您使用弱密碼，其他人將能夠暴力破解您的密鑰文件。如果您在云端備份种子，您很快就會變穷。
  q14: 門羅幣 100% 匿名吗？
  a14: 不存在 100% 匿名的东西。如果没有别的，您的匿名集就是使用門羅幣的人群。有些人不使用門羅幣。門羅幣也可能有漏洞。即使没有，現在或以后可能存在通過門羅幣的隱私層推断某些信息的方法。攻击只會變得更好。如果您系安全带，您仍然可能在车祸中死亡。使用常识、谨慎和深度防御。
  q15: 門羅幣是混币器或混币服務吗？
  a15: 不是。門羅幣使用完全非交互式、非托管式和自动的流程來創建私密交易。相比之下，對于混币服務，用戶選擇加入參與。
  qwallet: 我應該使用什么錢包？
  awallet: 有多种錢包可用于大量平台。在本網站上，您會找到核心團隊发布的錢包（GUI 和 CLI）以及广受信任且開源的第三方桌面和移动錢包列表。
  qnofunds: 我看不到我的資金。我刚刚失去了所有門羅幣吗？
  anofunds: "您可能没有。很难簡單地'丢失'您的币，因為從技術上讲它們无处可寻。您的币'存在'于區塊鏈上，并通過密碼学保護的公钥和私钥系統鏈接到您的賬戶。這就是為什么如果您看不到您的資金，可能是因為技術問題。查看本頁顶部的'資源與幫助'部分，获取有用資源列表，這些資源將幫助您识别和解决問題。"
  qnodetor: 如何通過 Tor 連接我的節點？
  anodetor: 對 Tor 的支持仍处于初期阶段，但已經可以通過網絡本地發送交易并在 Tor 網絡上運行門羅幣 @daemon。更好的 Tor 和 I2P 集成正在進行中。
  qfullpruned: 如何决定是運行完整節點還是修剪節點？
  afullpruned: "完整 @node 需要相当大的存储空间，下載和驗證整個區塊鏈可能需要很长時间，尤其是在较旧的硬件上。如果您的存储空间有限，建議使用修剪節點。它仅存储 1/8 的不必要區塊鏈数据，同時保留完整的交易歷史。如果有足够的存储空间，建議使用完整節點，但修剪節點仍然對網絡有很大貢獻并改善您的隱私。"
  qblocksize: 門羅幣區塊鏈有多大？
  ablocksize: "門羅幣 @blockchain 始终在增长，因此没有固定大小。截至 2024 年，完整區塊鏈约為 ~225GB。修剪的區塊鏈约為 ~86GB。查看門羅幣百科条目 @pruning 了解完整和修剪區塊鏈之间的区别。"
  qblockspace: 為什么區塊鏈需要這么多空间？
  ablockspace: "当您下載 @blockchain 時，您正在下載自門羅幣網絡創建以來发生的 @transactions 的整個歷史。交易和相关数据很大，每個節點都必須保留整個歷史以確保每個人都相同。@Pruning 區塊鏈允许運行仅保留 1/8 的非严格必要區塊鏈数据的節點。這导致區塊鏈比完整區塊鏈小 2/3。對于磁盘空间有限的人來說很方便。查看門羅幣百科条目 @node 和 @remote-node 了解更多详情。"
  qavoidbc: 我可以避免下載整個區塊鏈吗？
  aavoidbc: "是的。您不需要下載 @blockchain 即可在網絡上進行交易。您可以連接到 @remote-node，它會為您存储區塊鏈。所有最常见的 @wallets（包括 GUI 和 CLI）都允许使用遠程節點在網絡上進行交易。有多种方式可以利用此功能。例如，GUI 和 CLI 提供'引导節點'功能，允许人們下載自己的區塊鏈，同時使用遠程節點立即使用網絡。不断探索改善門羅幣網絡可用性的方法。"
  qscanned: 為什么每次打开錢包都需要掃描？
  ascanned: 大约每 2 分鐘會向 @blockchain 添加一個新的 @block。您的錢包需要掃描這些区块以查找属于它的 @transactions。使用轻錢包（也称為遠程同步錢包）時，此过程不是必需的。對于轻錢包，遠程服務器（可能由您管理）代表您進行掃描。
  qdangernode: 運行個人節點危险吗？
  adangernode: "運行個人 @node 是與門羅幣網絡交互的最安全方式，因為您完全控制，不需要依赖第三方。從一般角度來看，運行節點并不危险，但請記住，您的 ISP 可以看到您正在運行門羅幣節點。"
  qdangerrnode: 使用遠程節點危险吗？節點操作员可以從我這里獲得什么数据？
  adangerrnode: "始终建議，特别是對于注重隱私的用戶，在網絡上進行交易時使用個人節點以實現最高的隱私率。有些人為了方便更喜欢使用不受其控制的 @remote-node（公共節點）。不必處理 @blockchain 個人副本的便利是有代价的：隱私降低。遠程節點操作员能夠看到交易來自什么 IP 地址（即使無法看到接收者或金额），在某些极端情况下，可以進行能夠降低您隱私的攻击。通過在 Tor 或 I2P 網絡上使用遠程節點或使用 VPN 可以減轻一些危险。"
  qantivirus: 為什么我的杀毒軟件/防火墙將我刚下載的門羅幣軟件標記為恶意軟件？
  aantivirus: 下載門羅幣軟件（GUI 和 CLI）后，您的杀毒軟件或防火墙可能會將可执行文件標記為恶意軟件。有些杀毒軟件只是警告您可能的威胁，其他杀毒軟件會静默刪除您下載的 @wallet / @daemon。這很可能是因為集成的礦工，它用于挖礦和 @block 驗證。一些杀毒軟件可能錯误地將礦工视為危险軟件并采取行动刪除它。
  aantivirus1: 正在討論该問題并制定解决方案。同時，如果您收到杀毒軟件的警告，請確保您下載的軟件是合法的（請參见下面鏈接的指南），然后在杀毒軟件中為其添加例外，這样就不會被刪除或阻止。如果您需要幫助，請随時聯繫社區。
  qmoneromeaning: "為什么門羅幣被称為'Monero'？"
  amoneromeaning: "Monero 是世界语單词，意思是'硬币'。最初門羅幣被称為'Bitmonero'，在世界语中翻譯為'比特币'。社區决定從原始維護者分叉后，'bit'被刪除，改為簡單的'Monero'。"
  qimporting: 我可以手动導入區塊鏈吗？
  aimporting: >
    是的，您可以，但您可能不應該。導入外部 @blockchain 非常占用資源，并迫使您信任為您提供區塊鏈的實體。通常以正常方式下載更快：運行節點并讓它與網絡中的其他 @nodes 同步。如果您使用 Windows，請遵循下面的指南。如果您是 Linux 用戶，可以使用"monero-blockchain-import"工具，该工具包含在下載 GUI 或 CLI 錢包時的存档中。使用此命令开始同步導入的區塊鏈："monero-blockchain-import --input-file blockchain.raw"。
  qhf: 門羅幣真的每 6 個月進行一次硬分叉吗？
  ahf: 門羅幣曾經每年進行 2 次網絡升级（硬分叉），但現在不再是這样。選擇双年硬分叉是為了能夠引入重要的共识變更，這些變更添加了隱私功能和網絡范围的改進（例如 @bulletproofs 和 CLSAG 都需要硬分叉）并避免協議僵化。最近，双年硬分叉包括對 PoW 算法的更改，以保持抗 ASIC 性。
  ahf1: 開發社區和核心團隊一致認為協議足够稳定和成熟，不再需要双年硬分叉。此外，門羅幣周围的生態系統在這些年中呈指数级增长，频繁的協議更改將越來越难以协调，可能不利于生態系統的增长和用戶體驗。锦上添花的是，新算法 @RandomX 正在確保长期抗 ASIC 性，因此不再需要定期更改。網絡升级仍將用于添加重要的協議改進和共识更改，但频率较低且不那么严格（每 9-12 個月）。最后一次硬分叉是在 2022 年 8 月 13 日。
  qvideos: 有我可以觀看的視頻來了解門羅幣吗？
  avideos: >
    多年來，社區創建了大量信息内容，如文章和視頻。其中大部分視頻在 YouTube 等平台上公开提供。在本網站上，我們托管了一些解释門羅幣基础知识的視頻。為了優化其有效性，应按顺序觀看它們：
