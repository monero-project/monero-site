  qlongtimemove: 我很长時间没有使用我的門羅幣了，我是否因為硬分叉（網絡升级）而丢失了我的币？
  alongtimemove: 不用担心，您的币是安全的。要能夠使用它們，您只需下載并運行最新的門羅幣軟件。您可以使用之前保存的 @mnemonic-seed 随時恢復您的錢包。請注意，門羅幣中的硬分叉是预定的且无争议的。這意味着不會創建新币。
  qvuln: 門羅幣有已知的漏洞吗？
  avuln: >
    門羅幣社區創建了一系列名為"Breaking Monero"的視頻，其中探索和討論了潜在的門羅幣漏洞。有 14 個視頻，每個探索不同的主题。查看 <a href="https://www.youtube.com/playlist?list=PLsSYUeVwrHBnAUre2G_LYDsdo-tD0ov-y">YouTube 上的播放列表</a>。
  vulnspotify: 在 Spotify 上作為播客提供
  qasicresistance: "什么是抗 ASIC？為什么它很重要？"
  aasicresistance: ASIC 基本上是專门為做一件工作而創建的特殊計算機，與為通用目的而制造的普通計算機相反。這個特性使 ASIC 在 @mining 方面非常高效。
  aasicresistance1: 問題是這些設備非常昂贵，只有少数人能夠负担得起。這导致少数實體拥有網絡的大量算力，這對網絡本身的安全性構成严重威胁。例如，如果大型 ASIC 操作员串通并設法獲得網絡的大部分算力，他們可以任意拒绝交易。
  aasicresistance2: >
    門羅幣通過抗 ASIC 解决了這個問題：它使用一种算法（@randomx），大大降低了 ASIC 的效率，使其无利可圖。礦工可以使用普通消费级硬件，這允许他們公平竞争。門羅幣網絡目前由数千名使用'常规'計算機的礦工保護。這导致網絡更难攻击，没有礦工比其他礦工有显著优势（他們都使用或多或少相同的硬件）。
  qmaxsupply: 門羅幣的最大供应量是多少？
  amaxsupply: 門羅幣有固定的发行率，而不是設定的最大供应量。門羅幣尾部发行從区块 2641623 开始，于 2022 年 6 月 9 日 00:29 UTC，并將永久保持在每分鐘 0.3 XMR（每 @block 0.6 XMR）。這在第一年约為 1% 的通货膨胀率，未來几年將接近 0% 的通货膨胀率。這個 @tail-emission 允许永久激励來保護門羅幣，即使在遥遠的未來，同時保持通货膨胀率非常低。
  qtailemission: 為什么門羅幣没有最大供应量？
  atailemission: 礦工通過 @mining 区块在門羅幣網絡上處理交易。@block 的礦工獲得 .6 XMR 的恒定区块奖励，以及在该区块中有交易的用戶的 @transaction 費用。門羅幣有区块奖励而不是仅依赖交易費用，以激励礦工繼續用他們的算力保護網絡，并保持交易費用低。
  atailemission1: 這個恒定区块奖励导致的 @tail-emission 创造了低于 1% 的通货膨胀率，随着時间的推移趋向于 0%。貨幣的固定发行確保人為腐败不能过度膨胀供应。保持網絡可预測、去中心化和安全。


mining:
  intro1: 門羅幣是一种依赖工作量證明挖礦來實現分布式共识的加密貨幣。以下是一些關於如何开始挖礦的信息和資源。
  intro2: 門羅幣項目不認可任何特定的矿池、軟件或硬件，以下内容仅供參考。
  pow: 工作量證明
  philosophy: >
    門羅幣的哲学之一是維持平等挖礦，讓每個人都有挖礦的可能性。為了實現這一点，門羅幣使用由門羅幣社區成员構思和開發的特殊算法：@RandomX。這個 PoW 算法抗 ASIC，這意味着無法構建專用硬件來挖掘門羅幣。礦工必須使用消费级硬件并公平竞争。
  efficiency: 門羅幣可以由 CPU 和 GPU 挖掘，但前者效率要高得多。
  miningset: 獨立或矿池挖礦
  miningsetp: >
    礦工可以决定是喜欢獨立挖礦還是在矿池中挖礦。每种方法都有其优点和缺点，但門羅幣項目鼓励個人使用門羅幣軟件（<a href="https://www.getmonero.org/downloads/#gui">GUI</a> 和 <a href="https://www.getmonero.org/downloads/#cli">CLI</a>）進行獨立挖礦，因為這种类型的獨立挖礦是增強門羅幣網絡鲁棒性的最有效方式。也鼓励使用 P2Pool 挖礦。
  procons: "獨立和矿池挖礦的优缺点："
  solo: 獨立
  prosecure: 使網絡比在矿池中挖礦更安全
  prowallet: 您可以使用門羅幣錢包挖礦。无需额外軟件
  conlong: "根据您的算力，可能需要数月才能找到一個区块。這通常被称為'抽奖'"
  pool: 矿池
  propay: 频繁支付。您將根据您在所选矿池中的參與程度獲得 XMR。
  conopfee: 您必須向矿池運营商支付費用
  conminfee: 您只能使用第三方軟件進行矿池挖礦，這可能會占用您一小部分份额
  conpolcent: 太多人在單個矿池上挖礦可能导致矿池拥有 >50% 的總算力，這很危险
  choosepol: "如果您需要幫助選擇矿池或只是想了解更多信息，請使用："
  hardware: 硬件
  hardwarep: 門羅幣可以在 CPU 和 GPU 上挖掘，但后者的效率遠低于前者。您可以使用 <a href="https://xmrig.com/benchmark">xmrig 基准頁面</a>了解您的硬件與其他硬件相比的性能（某些結果可能已过時）。
  software: 軟件
  softwarep: >
    在挖礦軟件方面有多种選擇。如前所述，要進行獨立挖礦，可以使用 CLI 或 GUI 錢包（仅 CPU）。如果您想在矿池中挖礦或使用 GPU 挖礦，您需要專用軟件。支持門羅幣的礦工：
  software_para: 請注意，某些礦工可能有開發者費用。
  support: 支持
  supportp: 如果您有問題或只是想與其他礦工交流，請來門羅幣挖礦聊天。在 <a href="https://matrix.to/#/%23xmrmine:matrix.org">Matrix</a> 和 <a href="irc://irc.libera.chat/#monero-mining">Libera</a> 上。
  p2poolh: "P2Pool：獨立和矿池挖礦的最佳結合"
  p2poolnew: >
    P2Pool 是一种巧妙的新型門羅幣挖礦方式，允许礦工獲得矿池提供的频繁支付，而无需信任中心化矿池。P2Pool 是一個点對点挖礦池，讓礦工完全控制他們的門羅幣節點及其挖掘内容。更多详情請參见 <a href="/2021/10/05/p2pool-released.html">公告帖</a>。
  p2poolp: >
    P2Pool 是門羅幣的侧链，P2Pool 区块可能是門羅幣区块。每個礦工提交包含對同時挖礦的所有礦工（当前在 PPLNS 窗口中有份额的礦工）的支付的区块模板。高质量的区块模板作為区块添加到 P2Pool 區塊鏈；這些計為找到它們的礦工的"份额"。
  p2poolfeatures: 主要功能
  p2pdecentralized: <b>去中心化：</b>没有可以关闭/阻止/恶意的中央服務器。
  p2ppermissionless: <b>无需许可：</b>任何人都可以加入侧链，并且實际上無法審查個别礦工。
  p2ptrustless: <b>无需信任：</b>没有矿池錢包；資金從不托管。所有矿池区块立即向礦工支付。
  p2pplns: <b>PPLNS</b> 支付方案
  p2pzerofee: 0% 費用
  p2pzeropayout: <b>0 XMR</b> 支付費用
  p2pminpayout: 低于 0.0004 XMR 最低支付
  p2pmoreinfo: "項目 GitHub 仓库上的更多信息和详情："

what-is-monero:
  need-to-know: 您需要知道什么
  leading: 門羅幣是專注于私密和抗審查交易的领先加密貨幣。
  leading_para1: 大多数現有的 @cryptocurrencies，包括比特币和以太坊，都有透明的 @blockchains。@transactions 可以被世界上任何人驗證和/或追踪。這意味着這些 @transactions 的發送和接收 @addresses 可能與現實世界的身份相关联。
  leading_para2: 另一方面，門羅幣使用各种技術來確保其用戶的隱私。
  confidential: 門羅幣交易是保密且無法追踪的。
  confidential_para1: "與選擇性透明的替代方案（例如 Zcash）不同，門羅幣是唯一一种默認情况下每個用戶都是匿名的主要加密貨幣。每笔交易的發送方、接收方和金额都通過使用三种重要技術隐藏：@Stealth-Addresses、@Ring-Signatures 和 @RingCT。"
  confidential_para2: 因為每笔交易都是私密的，門羅幣無法被追踪。這使其成為真正的 @fungible 貨幣。接受門羅幣的商戶和個人不需要担心黑名單或被污染的币。
  grassroots: 門羅幣是一個草根社區，吸引世界上最好的加密貨幣研究人员和工程人才。
  grassroots_p1: 門羅幣項目处于加密貨幣隱私和安全的前沿。其
  grassroots_p2: 研究實驗室
  grassroots_p3: 和開發團隊不断致力于新的创新技術。自推出以來，该項目已收到來自全球
  grassroots_p4: 500 多名開發者
  grassroots_p5: 的貢獻。
  grassroots_p6: 众多
  grassroots_p7: 论坛和聊天频道
  grassroots_p8: 可供任何人加入，社區始终欢迎新成员。
  electronic: 門羅幣是电子現金，允许快速、廉价地向世界任何地方付款和收款。
  electronic_para1: 使用門羅幣，没有电汇或支票清算費用，没有多天的持有期，也没有欺诈性退單。因為門羅幣是去中心化的，它不受任何特定法律管辖区的约束，并提供免受资本管制的安全。
  videos: 門羅幣視頻（英文）
  aboutb: 關於
  walletb: 获取錢包
  getb: 获取門羅幣
  joinb: 加入工作組

about:
  history: 简史
  history_para1: 門羅幣于 2014 年 4 月推出。這是 CryptoNote 參考代碼的公平、预先宣布的推出。没有预挖或瞬间挖礦，区块奖励的任何部分都不归開發。請參见原始 Bitcointalk 主题
  history_para2: 這里。
  history_para3: 创始人 thankful_for_today 提出了一些社區不同意的有争议的變更。发生了争执，門羅幣核心團隊分叉了項目，社區跟随了這個新的核心團隊。自那時起，這個核心團隊一直提供监督。
  history_para4: 門羅幣自推出以來進行了多项重大改進。區塊鏈被迁移到不同的数据库結構以提供更高的效率和灵活性，設置了最小环签名大小，以便所有交易都是強制私密的，并實施了 RingCT 以隐藏交易金额。几乎所有改進都提供了安全性或隱私性的改進，或者促進了使用。門羅幣繼續以隱私和安全為首要目標，易用性和效率為次要目標发展。
  values: 我們的价值觀
  values_para: 門羅幣不仅仅是一项技術。它也是技術所代表的东西。以下列出了一些重要的指导理念。
  security: 安全
  security_para: 用戶必須能夠信任門羅幣及其交易，没有錯误或攻击的风险。門羅幣向礦工提供全额区块奖励，他們是提供此安全性的網絡中最关键的成员。交易使用可用的最新和最具弹性的加密工具進行加密保護。
  privacy: 隱私
  privacy_para: 門羅幣非常重视隱私。門羅幣需要能夠在法庭上保護用戶，在极端情况下，免受死刑。這种级别的隱私必須完全可供所有用戶訪問，无论他們在技術上是否有能力或對門羅幣的工作原理一无所知。用戶需要以這样的方式自信地信任門羅幣，即他們不會因為担心其他人发現而被迫改變他們的消费习惯。
  decentralization: 去中心化
  decentralization_para: 門羅幣致力于在網絡安全和代碼開發方面提供最高程度的去中心化。其工作量證明算法防止專用挖礦硬件主导網絡，并允许公平分配区块奖励。此外，門羅幣的開發和研究通過全球协作進行，項目以最大透明度進行。每個開發决策都對公开討論开放，每個主要開發者會议都在線发布。

