research-lab:
  intro: 門羅幣不仅致力于创造可互换性的貨幣，而且還致力于研究涉及加密貨幣的金融隱私领域。以下是我們自己的門羅幣研究實驗室的工作，以后還會有更多論文。
  intro_contact: "要聯繫門羅幣研究實驗室，請加入我們的 <a href='https://matrix.to/#/#monero-research-lab:monero.social'>Matrix</a>/<a href='irc://irc.libera.chat/#monero-research-lab'>IRC 频道</a>"
  mrl_papers: MRL 研究人员撰寫的論文
  related_mrl_papers: 與門羅幣相关的論文
  papersbutton: 訪問 MoneroResearch.info
  papersp: 探索與門羅幣相关的广泛研究論文。
  abstract: 摘要
  introduction: 介绍
  read-paper: 閱讀論文
  summary: 總結
  mrlhtp: 理解 ge_fromfe_frombytes_vartime
  mrlhtp_summary: 門羅幣使用一种獨特的哈希函数，將標量转换為椭圆曲線点。它對于創建密鑰镜像特别有用。本文檔由 Shen Noether 撰寫，將其代碼實現（ge_fromfe_frombytes_vartime() 函数）转换為数学表達式。
  mrl1: CryptoNote 2.0 中可追踪性链式反应的注释
  mrl1_abstract: 本研究公告描述了對基于环签名的匿名系統的合理攻击。我們以 Nicolas van Saberhagen 在 2012 年表面上发布的加密貨幣協議 CryptoNote 2.0 為动机。之前已經證明，隐藏一次性密鑰對的不可追踪性可能取决于組成该环签名的所有密鑰的不可追踪性。這允许环签名之间的可追踪性链式反应的可能性，如果參数選擇不当且攻击者拥有足够比例的網絡，则會导致整個網絡的不可追踪性严重丧失。然而，签名仍然是一次性的，任何此类攻击仍然不一定會侵犯用戶的匿名性。然而，這种攻击可能會削弱 CryptoNote 對區塊鏈分析的抵抗力。本研究公告尚未經过同行評審，仅反映内部调查的結果。
  mrl2: 通過使用 CryptoNote 協議的虚拟貨幣中的 Merkle 树漏洞進行伪造
  mrl2_abstract: 2014 年 9 月 4 日，對門羅幣加密貨幣網絡执行了一次不寻常且新颖的攻击。這次攻击將網絡划分為两個不同的子集，它們拒绝接受另一個子集的合法性。這產生了无数影響，其中并非所有影響都是已知的。例如，攻击者有一個短暂的時间窗口，在此期间可能发生某种伪造。本研究公告描述了允许此攻击的 CryptoNote 參考代碼中的缺陷，描述了 Tigusoft.pl 的 Rafal Freeman 最初提出的解决方案以及随后由 CryptoNote 團隊提出的解决方案，描述了門羅幣代碼库中的当前修復，并詳細說明了违规区块對網絡的影響。本研究公告尚未經过同行評審，仅反映内部调查的結果。
  mrl3: 門羅幣并不那么神秘
  mrl3_abstract: 最近，基于 CryptoNote 源代碼和協議比比特币等協議更複雜的事實，互联网上流傳着一些關於 CryptoNote 源代碼和協議的模糊恐惧。本說明的目的是试圖澄清一些误解，并希望消除围绕門羅幣环签名的一些神秘感。我將首先比较 CryptoNote 环签名中涉及的数学（如 [CN] 中所述）與 CryptoNote 所基于的 [FS] 中的数学。之后，我將比较环签名的数学與 CryptoNote 代碼库中實际存在的内容。
  mrl4: 改進 CryptoNote 協議中的混淆
  mrl4_abstract: 我們识别了几种可用于降低 CryptoNote 2.0 協議不可追踪性的區塊鏈分析攻击。我們分析了可能的解决方案，討論了這些解决方案的相對优点和缺点，并建議對門羅幣協議進行改進，希望能為加密貨幣對區塊鏈分析提供长期抵抗力。我們對門羅幣的建議改進包括協議级網絡范围的最小混入策略 n = 每個环签名 2 個外部输出，两年后協議级將此值增加到 n = 4，以及在过渡期间錢包级默認值為 n = 4。我們還建議使用种子式方法發送門羅幣输出。我們還討論了一种非均匀的、依赖年龄的混入選擇方法來減轻此处识别的其他形式的區塊鏈分析，但出于各种原因，我們不對實施提出正式建議。還詳細討論了這些改進后的影響。本研究公告尚未經过同行評審，仅反映内部调查的結果。
  mrl5: 环签名机密交易
  mrl5_abstract: 本文介绍了一种在強去中心化匿名加密貨幣門羅幣中隐藏交易金额的方法。與比特币类似，門羅幣是一种通過工作量證明"挖礦"过程分发的加密貨幣。最初的門羅幣協議基于 CryptoNote，它使用环签名和一次性密鑰來隐藏交易的目的地和來源。最近，比特币核心開發者 Gregory Maxwell 討論并實施了使用承诺方案隐藏交易金额的技術。在本文中，描述了一种新型环签名，一种多層可鏈接自发匿名組签名，它允许以合理的效率和可驗證的、无需信任的币生成來隐藏交易的金额、來源和目的地。提供了協議的一些扩展，如聚合 Schnorr 范围證明和环多重签名。作者想指出，本文的早期草稿在門羅幣社區和比特币研究 irc 频道上公开。區塊鏈哈希草稿可在 [14] 中獲得，顯示這项工作始于 2015 年夏季，并于 2015 年 10 月初完成。电子预印本也可在 http://eprint.iacr.org/2015/1098 獲得。
  mrl6: 門羅幣子地址的高效實現
  mrl6_abstract: 希望以不可鏈接的方式重復使用錢包地址的門羅幣加密貨幣用戶必須維護單獨的錢包，這需要為每個錢包掃描傳入交易。我們記录了一种新的地址方案，允许用戶維護單個主錢包地址并生成任意数量的不可鏈接子地址。每笔交易只需要掃描一次，以確定它是否發送给用戶的任何子地址。该方案還支持向其他子地址的多個输出，并且與傳统錢包交易一样高效。
  mrl7: 已花费输出集
  mrl7_abstract: 本技術說明使用基本集合论概括了花费输出的概念。该定义捕获了识别此类输出的各种早期工作。我們量化了這种分析對門羅幣區塊鏈的影響，并简要概述了缓解措施。
  mrl8: 双可鏈接环签名
  mrl8_abstract: 本公告描述了對門羅幣可鏈接环签名方案的修改，允许双密鑰输出作為环成员。密鑰镜像與双中的两個输出一次性公钥绑定，防止该交易中的两個密鑰單獨花费。此方法適用于非交互式退款交易。我們討論了该方案的安全含义。
  mrl9: Thring 签名及其在支付者模糊數字貨幣中的应用
  mrl9_abstract: 我們提出了用于协作計算环签名的阈值环多重签名（thring 签名），提出了 thring 签名的存在性伪造游戏，并討論了 thring 签名在數字貨幣中的用途，包括无需信任設置的机密金额的支付者模糊跨链原子交换。我們提出了 thring 签名的實現，我們称之為可鏈接自发阈值匿名組签名，并證明该實現是存在性不可伪造的。
  mrl10: 跨組的离散對数相等性
  mrl10_abstract: 本技術說明描述了一种用于證明跨不同組知道相同离散對数的算法。该方案將公共值表示為位的標量表示，并使用一組环签名來證明每個位是一個有效值，该值在两個標量組中相同（達到等价性）。
  iacr2019654: 简洁可鏈接环签名和對抗性密鑰的伪造
  iacr2019654_abstract: 我們證明了一种非诽谤性版本是可鏈接环签名不可伪造性的自然定义。我們提出了一种具有简洁签名和多維密鑰的可鏈接环签名構造，如果随机预言机的决策性 Diffie-Hellman 問題的變體是困难的，则可鏈接匿名，如果密鑰聚合是單向函数，则可鏈接，如果离散對数問題的一次多變體是困难的，则非诽谤。我們評论了在无需信任設置的签名者模糊机密交易模型中的一些应用。
  iacr2020018: "Triptych：對数大小的可鏈接环签名及其应用"
  iacr2020018_abstract: 环签名是一种常见構造，用于在签名時指定的非交互式公钥集中提供签名者模糊性。與早期方法不同，早期方法的签名大小與签名者匿名集的大小成線性关系，当前的最佳解决方案要么需要中心化的信任設置，要么產生對数大小的签名。然而，很少有方法還提供可鏈接性，這是一种用于確定消息的签名者是否签署了任何先前消息的属性，可能對匿名集選擇有限制。在這里，我們介绍了 Triptych，一系列无需信任設置的可鏈接环签名，基于對开放到零的承诺的零知识證明的泛化。我們通過將構造扩展到獨立匿名集中的并行承诺的开放，展示了 Triptych 在签名者模糊交易協議中的应用。签名在匿名集大小上是對数的，虽然驗證複雜度是線性的，但證明集合可以批量高效驗證。我們表明，對于分布式協議中實用的匿名集大小，Triptych 以直接的構造提供了竞争性能。
  iacr2020312: "Arcturus：机密交易的高效證明"
  iacr2020312_note: "注意：本論文已被撤回，但可以通過点击'本報告的所有版本'查看。"
  iacr2020312_abstract: 机密交易用于分布式數字资產中，以證明隐藏在承诺中的值的平衡，同時保持签名者模糊性。先前的工作描述了一种签名者模糊的零知识證明，用于證明在多個公共承诺集中的相同索引处打开到零的承诺，以及用作鏈接標签的可驗證随机函数的評估，并使用它來構建称為 Triptych 的可鏈接环签名，该签名可用作机密交易模型的構建块。在這项工作中，我們扩展了 Triptych 以構建 Arcturus，一种證明系統，该系統證明了在單個集合内打开多個承诺到零、在每次打开時正確構造可驗證随机函数的評估，以及在單個證明内跨單獨的承诺列表的值平衡。虽然可靠性取决于新颖的双离散對数硬度假設，但我們使用門羅幣區塊鏈的数据表明，Arcturus 可以在机密交易模型中使用，以提供比其他无需信任設置的最先進構造更快的總批量驗證時间。
  cypherstack202410: 門羅幣中临時交易的一致最強大檢驗
  cypherstack202410_abstract: 我們為具有小匿名集認證的交易協議（TPSASA）中的交易引入了一种通用的、低成本、低功耗统計測试，例如門羅幣。该測试將交易分类為临時（自发構造以花费確定性選擇的密鑰）或自我混淆（從與默認錢包軟件非常接近的概率分布構造，并且發送者和接收者相同）。该測试是 Neyman-Pearson 引理的一致最強大（UMP）似然比檢驗（LRT），不對用戶行為做任何假設。我們將這些測试扩展到利用有关用戶行為的先驗信息。我們討論了測试參数化，以及匿名集基数和用戶行為如何影響測试性能。我們還描述了基于我們的測试對門羅幣的最大似然去匿名化攻击。
  cryptonote: Cryptonote 白皮书
  cryptonote-whitepaper: Cryptonote 白皮书
  cryptonote-whitepaper_para: 這是 cryptonote 團隊編寫的原始 cryptonote 論文。閱讀它將使您了解 cryptonote 算法的一般工作原理。
  annotated: 带注释的白皮书
  annotated_para: 門羅幣研究實驗室发布了 cryptonote 白皮书的带注释版本。這有点像對白皮书逐行提出的主张的非正式評论。它還用相對容易理解的术语解释了一些较难的概念。
  brandon: Brandon Goodell 的白皮书評论
  brandon_para: 本文是 MRL 研究员 Brandon Goodell 對原始 cryptonote 論文的正式評论。他深入研究了 cryptonote 論文中提出的主张和数学。
  libraryp: "资料库包含有用的文檔，如'從零到門羅幣'和'精通門羅幣'，它們詳細探索和解释門羅幣。"
  librarybutton: 探索资料库

specs:
  title: 技術信息
  intro: 這里列出了一些關於門羅幣的基本技術信息。有关更深入的细节，請查閱
  intro_link: 资料库
  intro1: 或聯繫社區
  pow_title: 工作量證明
  pow: 門羅幣使用 @randomx，一种由門羅幣社區成员創建的抗 ASIC 且對 CPU 友好的 POW 算法，旨在使使用特定挖礦硬件變得不可行。門羅幣以前使用 CryptoNight 和此算法的變體
  pow_link: GitHub 仓库中的更多信息
  block_emission_title: 发行曲線
  block_emission_pre: "為了確保始终有挖掘門羅幣并保持其安全的激励，发行是无限的。有两种主要发行："
  block_emission_main: "首先，主曲線：到 2022 年 5 月底约 1813.2 万枚币"
  block_emission_tail: "然后，尾部发行（每 2 分鐘区块 0.6 XMR）在主发行完成后开始。這转化為 <1% 的通货膨胀率，随着時间的推移百分比趋向于 0"
  blocks_title: 区块
  blocks: 大约每 ~2 分鐘創建一個新的 @block。没有最大区块大小，而是区块奖励惩罚和动態区块大小，以確保动態 @scalability
  privacytech_title: 主要隱私增強技術
  privacytech_ringct: "@RingCT"
  privacytech_sh: "@Stealth-Addresses"
  privacytech_rs: "@ring-signatures"
  privacytech_tor-i2p: 通過 Tor/I2P 的交易
  privacytech_dandelion: Dandelion++

library:
  description: "以下是一些可供您下載的出版物、书籍或杂志。"
  books: 书籍
  zerotomonerov2: "從零到門羅幣：第二版"
  zerotomonerov2p: >
    发布日期：2020 年 4 月 4 日，<a href="https://github.com/UkoeHB/Monero-RCT-report">LaTeX 源代碼在此</a><br>
    對門羅幣的全面概念性（和技術性）解释。<br>
    我們努力教任何懂基本代数和簡單計算機科学概念（如數字的"位表示"）的人不仅了解門羅幣如何在深入和全面的層面上工作，而且了解密碼学是多么有用和美丽。
  zerotomonerov2langs: 提供<a href="Zero-to-Monero-2-0-0-ru.pdf">俄语</a>、<a href="Zero-to-Monero-2-0-0-pt.pdf">葡萄牙语</a>和<a href="Zero-to-Monero-2-0-0-it.pdf">意大利语</a>版本。
  zerotomonerov1: "從零到門羅幣：第一版"
  zerotomonerov1p: >
    发布日期：2018 年 6 月 26 日，<a href="https://github.com/UkoeHB/Monero-RCT-report">LaTeX 源代碼在此</a>
  masteringmonerop: >
    一份引导您穿越看似複雜的門羅幣世界的指南。<br>
    它包括：
    <ul><li>對區塊鏈和隱私重要性的广泛介绍 - 非常適合非技術用戶。</li>
    <li>對比特币缺点和門羅幣提供的具體解决方案的討論。</li>
    <li>用戶故事（說明門羅幣如何保護您的隱私）、类比、示例、法律/道德討論和說明关键技術概念的代碼片段。</li>
    <li>門羅幣去中心化網絡、点對点架構、交易生命周期和安全原则的詳細信息。</li>
    <li>面向開發人员、工程师、軟件架構师和好奇用戶的門羅幣技術基础介绍。</li>
    <li>新发展，如 Kovri、Bulletproofs、多重签名、硬件錢包等。</li></ul>
  cheatsheets: 速查表
  thesalmonseries: "三文鱼系列"
  thesalmonseriesp: >
    處理門羅幣内部工作原理的信息圖。名称來自采用的颜色，具有语义含义（即使很弱）但也具有统一功能作為重復主题，在作者眼中类似于三文鱼褐變（從生到熟）:)
  moneroaddressescheatsheet20201206: "門羅幣地址速查表"
  moneroaddressescheatsheet20201206p: >
    在"大局"和数学细节之间，各种密鑰、地址、范围（私有/公有、花费/查看、链上/链下、付款人/收款人）及其关系的單頁回顾。
  ringscheatsheet20210301: "环速查表"
  ringscheatsheet20210301p: >
    從通用傳统签名到 CLSAG，通過环口味的视觉之旅，在海報大小的信息圖中逐步呈現其核心属性。
  rctcheatsheet20210604: "RingCT 速查表"
  rctcheatsheet20210604p: >
    美味的 RingCT Type 5 交易配方：每十一個 UTXO 一個 CLSAG，按口味添加門羅幣金额；用 Pedersen 承诺加厚一切，其整體平衡對服務员也是显而易见的，并用 BulletProof 釉料保護最后的承诺；在选定的隐身地址上食用，并在十個区块后才消费。干杯！
  zkbasicscheatsheet20220621: "ZK 基础速查表"
  zkbasicscheatsheet20220621p: >
    一個轻度理论性的插曲（希望仍然温和，试圖強调概念而不是形式主义并選擇接近的主题），為 Bulletproof 和其他未來的零知识相关功能（如果有的话）奠定基础。
  newsletters: 時事通讯
  revuomonero: >
    Revuo Monero 是一份每周時事通讯，您可以在其中找到最新的門羅幣新闻。
  themonerostandard: >
    Monero Standard 是 recanman 的每周出版物，提供有关門羅幣協議的最新新闻和信息。
    除了涵盖門羅幣社區的最新发展外，The Monero Standard 還包括每周價格圖表、挖礦池圖表、區塊鏈统計数据，甚至每周一個 Meme。
  moneroobserverblitz: >
    Monero Observer Blitz 提供門羅幣社區和協議最新发展的月度更新。
    由 escapethe3RA 撰寫，本出版物涵盖與門羅幣持續開發、社區活动和该领域内显著成就相关的新闻。
  moneroobserver: >
    由 escapethe3ra 創建的獨立資源，Monero Observer 提供門羅幣最新发展的每日報道。它還提供广泛的資源、實用指南和每周或每月亮点，幫助社區保持最新。
  twim: >
    來自門羅幣生態系統的每周见解和更新。随時了解私人數字貨幣世界的最新发展、新闻和分析。

