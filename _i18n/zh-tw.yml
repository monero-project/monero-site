index:
  page_title: "門羅幣 - 安全、隱私、無法追踪"

home:
  heading: Monero 意為金钱
  heading2: 私密、去中心化的加密貨幣，保證您财務隱私與安全。
  whatis: 了解更多關於門羅幣的信息
  about: 關於門羅幣
  joincommunity: 加入社區
  choosewallet: 選擇錢包
  choosewallet_para: 要使用門羅幣，首先需要一個錢包。訪問我們的下載頁面，選擇適合您的錢包。門羅幣錢包適用于多种平台，包含立即使用門羅幣所需的一切。
  downloads: 下載
  getcoins: 獲得門羅幣
  getcoins_para: 安装錢包后，您需要獲得一些門羅幣。有多种方式可以獲得門羅幣，比如挖礦或工作换取門羅幣，但最簡單的方式是使用交易所，將您的法定貨幣兑换成 XMR。许多中心化和去中心化交易所都支持門羅幣（XMR）。
  exchanges: 交易所
  useit: 這是一种貨幣，尽情使用它吧！
  useit_para: 門羅幣是一种貨幣，可以用來交换商品、服務和其他貨幣，私密且手續费极低。许多實體乐意接受 XMR 作為支付方式；請查看我們的"商戶"頁面。
  merchants: 商戶
  answers: 寻找問題的答案
  faq: 常见問題
  faq_para: 多年來我們听到了很多問題，并整理了一份详尽的常见問題解答。如果您的問題不在其中，您随時可以咨询社區。
  guides: 指南和資源
  guides_para: >
    社區汇集了大量資源和文檔。用戶可以在"用戶指南"部分找到關於常见配置和技巧的有用信息和指南。開發者可以在"開發者指南"中找到構建基于門羅幣的服務或與網絡通信所需的一切。资料库提供免费下載的出版物和书籍，包括完整的《精通門羅幣》和《從零到門羅幣》书籍。
  moneropedia_para: 您想查找門羅幣中使用的术语和概念的含义吗？這里您會找到按字母顺序排列的术语及其含义指南。
  moneropedia_button: 閱讀門羅幣百科
  contributecommunity: "我們需要您的技能：貢獻吧！"
  contributecommunity_para: 門羅幣不仅仅是一种貨幣，它是一個去中心化社區，只因数百位將時间奉献给項目的志愿者而存在。加入我們！
  researchlab_para: MRL（門羅幣研究實驗室）是門羅幣非常重要的一部分。來自全世界的研究者和密碼学家聚在一起寻找改進門羅幣的新方法。閱讀他們的論文，加入他們！
  visitmrl: 訪問 MRL
  contributing: 貢獻
  meetcommunity: "認识社區！"
  meetus: "門羅幣社區的成员遍布世界各地。您可以在多個平台上找到我們。來認识我們吧！"
  hangouts: 社區聚集地
  morevideos: 想要更多解释性視頻？

hangouts:
  intro: 門羅幣社區多元且多样化。我們來自世界各地，但我們確實有一些喜欢一起闲逛的地方。您會在下面找到其中大部分。加入我們！
  resources: 工作組資源
  resources_para: 正在寻找工作組？查看我們的工作組頁面。
  irc-matrix: IRC/Matrix 频道
  irc_para: 門羅幣社區使用大量 IRC 和 Matrix 频道，每個频道都有不同的用途。有些用于工作，有些只是闲逛。您會在下面找到最受欢迎的频道。
  bridges: 這些频道桥接到许多其他平台，允许社區使用他們喜欢的聊天服務/協議進行交流。
  matrixspace: Matrix 用戶可以加入我們的 <a href="https://matrix.to/#/%23monerospace:monero.social">Monero space</a> 查看频道的完整列表。
  mailing_list: 邮件列表
  mailing_list1: 您想直接在電子郵件地址接收重要公告吗？加入我們的邮件列表！
  subscribe: 訂閱
  matrixtutorial: 我們提供了一份分步指南：<a href="/resources/user-guides/join-monero-matrix.html">通過 Element 加入門羅幣社區 Matrix 服務器</a>
  irc_channels:
    monero: 此频道用于討論所有與門羅幣相关的事情。
    monero-community: 此频道供門羅幣社區聚集和討論想法。
    monero-markets: 我們使用此频道討論門羅幣和其他币的價格。
    monero-offtopic: 與其他門羅幣用戶聊天，討論與門羅幣无关的事情。
    monero-mining: 這是挖礦問題和討論的地方。
    monero-support: 您可以在此频道從有經驗的用戶那里獲得支持和提问。請記住；門羅幣没有官方支持，没有人會索要您的私钥，<a class="ext-noicon" href="https://dontasktoask.com/" target="_blank" rel="noreferrer noopener">不要问是否可以提问</a>。

merchants:
  descr: 在此頁面上，您會找到接受門羅幣作為支付方式的商店和商戶，以及交易門羅幣與其他貨幣的交易所。
  useit: "接受門羅幣的商戶"
  use: 多年來，各类商戶逐渐認识到門羅幣带來的金融隱私价值。事實上，商戶采用率正在持續上升。
  dirdescr: "如果您正在寻找使用門羅幣的地方，下面的目录提供了一些选项。請記住在信任他們處理您的資金之前做好自己的研究："
  descrp2p: 交换門羅幣與其他貨幣的好方法是使用点對点 [P2P] 交易所。P2P 交易所允许交易者直接互动，在某些情况下无需信任第三方（除了提供托管服務）。這些交易所通常比中心化和/或托管式交易所更加私密。
  swapsdescr: "使用原子交换（Atomic Swaps）是一种无需信任的門羅幣與其他加密貨幣交换方法。更多信息請參见博客文章："
  bisqdescr: 基于比特币和 Tor 的去中心化 P2P 交易所。
  cardfoss: "開源："
  cardkyc: "<b>无 KYC</b>（无需身份驗證）："
  cardbtcfiat: (可進行 BTC &#8596; 法幣交易)
  cardonion: "洋葱地址："
  cardi2p: "I2P 地址："
  noncustodial: "非托管式："
  locmondescr: 提供点對点交易的在線 P2P 交易所。
  depsell: 取决于卖家
  locnojs: (但提供无 JS 版本)
  simpleswapdescr: 非托管式即時交换所。
  disclaimer: |
    "請注意：這些鏈接仅為方便和信息目的而提供；它們不構成門羅幣社區對所列公司、組织或個人的任何產品、服務或意见的認可。門羅幣社區對這些外部網站的准確性、合法性或内容不承担责任。有关其内容的問題請聯繫外部網站。一如既往，买者自负；您有责任進行自己的研究。在線购物時始终保持判断力。"
  visitbisq: 訪問 Bisq
  centrexchanges: 中心化交易所 (CEXs) 和兑换服務
  centrexchangesp: 如果您更喜欢使用中心化交易所，這里列出了一些知名的中心化交易所和兑换服務。更多交易所支持門羅幣，我們在這里仅列出一些信誉良好的。
  cexp: 提供門羅幣與法定貨幣和加密貨幣交换的中心化交易所。
  swappersp: 兑换服務讓用戶可以將 XMR 兑换成其他加密貨幣。
  basicswapdexdesc: 去中心化 P2P 原子交换，專注于用戶體驗。
  visitbasicswapdex: 訪問 BasicSwapDEX
  setreq: 需要設置
  eigenwalletdescr: 使用原子交换將比特币兑换為門羅幣。
  visiteigenwallet: 訪問 Eigen Wallet
  havenodescr: 基于 Tor 和門羅幣構建的去中心化 P2P 交易所。非托管式，可直接進行法幣到 XMR 交易。
  visithaveno: 訪問 Haveno
  havenonetworks: "活跃網絡："

sponsorships:
  intro: 以下企業积极支持門羅幣項目將金融隱私带给全世界的目標。我們對他們的貢獻感激不尽。如果您想贊助門羅幣項目并被列在此頁面上，請發送電子郵件至 dev@getmonero.org。
  tari: Tari Labs 贊助本網站使用的 CDN。
  symas: Symas 贊助其 CTO Howard Chu (hyc) 在門羅幣代碼库上的工作。
  macstadium: MacStadium 贊助一台專用 Mac Mini，用于 Mac 相关開發。
  cakewallet: Cake Wallet 贊助"工具"服務器，包括邮件列表、GitLab、Matrix、Taiga 和 Weblate。
  cypherstack: Cypher Stack 贊助運維人员來維護門羅幣基础設施。
  pastsponsors: 过去的贊助商

team:
  introduction: 工作組由社區成员組成，他們联合起來實現共同目標。它們有不同的結構和目標。在此頁面上，我們列出了一些更活跃的工作組以及一些入门提示，如果您希望為其中任何一個做出貢獻。
  core: 核心團隊
  community: 社區工作組
  mrl: 研究實驗室
  descr: 描述
  start: 從哪里开始
  contacts: 聊天室和聯繫方式
  chat: "聊天："
  website: "網站："
  core_descr: 作為項目的管理者，核心團隊管理和維護無法避免中心化的基础設施（域名、網站、GitHub 仓库等）。其成员在適当時充当调解人，旨在权衡社區共识，延續使門羅幣成為今天成功項目的高质量互动。核心團隊不曾也從未接受任何經济补偿。
  core_start: 核心團隊是一個封闭的工作組；除非受邀，否则無法加入。
  community_descr: 此工作組供社區用于組织和协调。如果您是非編程人员并希望為門羅幣做出貢獻，請從這里开始。
  community_start: 开始為此工作組做出貢獻的最佳方式是加入聊天室并介绍自己，說明您的兴趣和您愿意為社區提供的技能。
  devworkgroup: 開發工作組
  devworkgroup_descr: "此工作組联合致力于門羅幣項目錢包和守護進程的開發人员。它由两個主要部分組成：CLI 團隊和 GUI 團隊。這些團隊使用两個不同的聊天室進行协调。"
  devworkgroup_start: 最好先查看两個仓库的开放問題，了解可以修復或改進的内容。两個代碼库，尤其是核心仓库，可能相当具有挑战性，因此建議首先在聊天室中寫信介绍自己、您的技能以及您希望貢獻的内容。
  chatgeneral: "聊天（通用）："
  chatgui: "聊天（GUI）："
  webworkgroup: 網站工作組
  web_descr: 這個以開發為重点的工作組协调網站的開發。大多数成员也是開發工作組的一部分。網站工作組主要是為了將與網站相关的討論集中在一個地方。
  web_start: 加入聊天室直接與工作組成员交谈總是一個好主意，但如果您更喜欢自己开始，請查看 GitHub 仓库中的 readme。它包含逐步說明來編輯此網站的每個部分。
  localization: 本地化工作組
  localization_descr: 門羅幣最古老的工作組之一，由致力于翻譯門羅幣相关軟件和文檔的貢獻者組成。強烈建議在开始翻譯工作之前聯繫工作組。
  localization_start: 在聊天室聯繫工作組或在 GitHub 仓库上开启問題。您也可以立即使用 Weblate 平台开始翻譯。只需確保首先閱讀翻譯者指南。
  locplatform: "本地化平台："
  telegram: "Telegram 聊天："
  mrl_descr: 顾名思义，門羅幣研究實驗室是專注于門羅幣相关研究的工作組。它由寻找改進門羅幣協議和功能的科学家組成。使門羅幣出色的大多数協議改進，如 CLSAG 和 @Bulletproofs，都是此工作組努力的結果。
  mrl_start: 加入下面的聊天室并說明您的兴趣和技能。研究始终在進行中，有人會為您指明正確的方向。
  space: Monero Space
  space_descr: Monero Space 是一個活跃的、以項目為重点的門羅幣工作組，為門羅幣社區提供服務。它托管流行資源并組织活动，如 Monero Meet。
  space_start: 可以通過在 Matrix/Libera 上向他們的聊天室寫信來聯繫该工作組。
  mrw: 恶意軟件響应工作組
  mrw_descr: 恶意軟件響应工作組為多种类型的門羅幣相关恶意軟件提供資源和實時支持。
  mrw_start: 此工作組的大部分活动发生在 IRC 聊天中。如果您希望貢獻，只需加入频道提问或提供支持。
  mpwg: 門羅幣政策工作組
  mpwg_descr: 門羅幣政策工作組是一個松散組成的個人法定人数，他們有兴趣與监管机構、政策制定者和更广泛的金融服務部门互动，以確保對門羅幣組成技術的广泛理解，特别是關於其與不断发展的监管和合规要求的兼容性。
  mpwg_start: 如果您想參與或关注政策討論，請加入 Matrix/Libera 聊天室。
  nwlb_descr: Seraphis 錢包工作組是一組致力于在門羅幣中實現 Seraphis 和 Jamtis 的開發人员，通過開發全新类型的錢包，將大幅改進門羅幣的隱私能力和可用性。
  nwlb_start: 该工作組經常开會，并在 Matrix 房间（中繼到 IRC）中协调。他們一直在寻找愿意幫助的貢獻者。
  docs: 門羅幣文檔工作組
  docs_descr: 此工作組致力于門羅幣及其工具的文檔編寫。
  docs_start: 您可以加入 IRC 或 Matrix 房间。

downloads:
  intro: 在此頁面上，您可以找到并下載門羅幣軟件的最新可用版本，以及硬件、轻錢包和移动錢包。
  choose: 選擇您的下載
  gui: 門羅幣圖形界面錢包
  cli: 門羅幣命令行錢包
  blockchain3: 導入門羅幣區塊鏈
  mobilelight0: 移动和轻錢包
  mobilelight: 移动和轻錢包
  hardware: 硬件錢包
  gui_intro: 由門羅幣社區開發的開源圖形用戶界面（GUI）錢包，完全免费使用，適合初学者和高级用戶。
  simplemode: 简易模式
  simplemode1: 專為技術水平较低的用戶創建，他們只想以最簡單、最快捷的方式使用門羅幣。打开錢包，自动連接到 @remote-node，發送/接收 XMR，完成！
  advancedmode: 進阶模式
  advancedmode1: 具備您可能需要的所有高级功能。非常適合經驗丰富的門羅幣用戶，他們更喜欢完全控制自己的錢包和節點
  merchantpage: 商戶頁面
  merchantpage1: 轻松接收 XMR 用于您的業務
  hwcompatible: 兼容硬件錢包
  hwcompatible1: 如 Trezor 和 Ledger
  fiatconv: 应用内法幣转换
  fiatconv1: 无需再在線查看您的 XMR 价值
  pruning: 區塊鏈修剪
