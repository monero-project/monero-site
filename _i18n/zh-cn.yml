faq:
  basics: 基础
  privacy: 隐私
  security: 安全
  economics: 经济
  wallets: 钱包
  node: 节点
  intro: 查找关于门罗币的常见问题和疑虑的答案。
  toc: 目录
  additional: "更多信息："
  resandhelp: 资源与帮助
  stackexchange: 关于门罗币最完整的资源之一。如果您的问题不在此常见问题中，您可能会在门罗币 StackExchange 上找到答案。
  userguides: 帮助用户与门罗币网络及其组件交互的文档集合。
  devguides: 开发者的指南和资源。
  monerosupport: 专门帮助门罗币用户的 subreddit。基本上是社区成员互相帮助。使用搜索选项。
  monerohow: "旧的知名资源，有大量指南和使用方法"
  qword: "'[技术词汇]'是什么意思？"
  aword: "门罗币中使用的术语可能相当复杂，为此我们有"
  aword1: "您经常看到的术语及其解释的综合列表。如果您不知道一个词的含义或想要更多相关信息，只需访问门罗币百科。一些经常搜索的术语示例：@node、@fungibility、@view-key、@pruning。"
  qcontribute: 我如何贡献？
  acontribute: "门罗币是一个开源社区项目。这意味着没有公司在运营它，也没有 CEO 雇佣人员。一切都由志愿者或社区资助的贡献者构建，他们将时间奉献给项目。有很多方式可以贡献："
  acontribute1: 翻译。这很容易，任何会说英语以外语言的人都可以帮助。翻译主要发生在
  acontribute2: "联系工作组。门罗币中几乎所有事情都由工作组管理，工作组是致力于开发某些特定方面的贡献者群体（通常由协调员领导）。一些例子包括：本地化工作组（翻译）、社区工作组、GUI 工作组、外联工作组等。工作组大多是独立的，有自己的结构。联系您感兴趣的工作组并询问如何帮助。有关联系方式列表，请参见"
  acontribute3: 做您最擅长的事。您是设计师吗？创建门罗币相关图像并到处传播。您是作家吗？撰写关于门罗币的文章。唯一的限制是您的想象力。找到您喜欢做的事并为门罗币做！
  acontribute4: "外联工作组写了一篇有用的文章来帮助新人："
  q1: 门罗币为什么有价值？
  a1: 门罗币有价值是因为人们愿意购买它。如果没有人愿意购买门罗币，那么它就不会有任何价值。如果需求超过供应，门罗币的价格就会上涨；如果供应超过需求，价格就会下跌。
  q2: 如何获得门罗币？
  a2: 您可以从交易所或个人那里购买门罗币。交易所是购买门罗币最常见的方式；大多数司法管辖区都有合规的交易所。一些钱包包含功能，可以轻松用法币或其他加密货币购买门罗币。或者，您可以尝试挖掘门罗币以从 @block 奖励中获得币。
  a2exchanges: "过去，您需要比特币才能购买门罗币，但现在不再是这样。您可以在许多交易所直接用国家货币（美元、欧元、英镑等）或其他加密货币交易门罗币。有些需要 KYC（身份证明）；其他的不需要，如去中心化交易所。本网站上有一个可以购买/出售门罗币（XMR）的交易所列表："
  q3: 为什么助记词很重要？
  a3: "@mnemonic-seed 是一组 25 个单词，可用于在任何地方恢复您的账户。请妥善保管这些单词，不要与其他人分享。您可以使用此种子恢复您的账户，即使您的计算机崩溃了。"
  q4: 门罗币的隐私与其他币有何不同？
  a4: "门罗币使用三种不同的隐私技术：@ring-signatures、环机密交易（@RingCT）和 @stealth-addresses。这些分别隐藏 @transaction 中的发送方、金额和接收方。网络上的所有交易都是强制私密的；没有办法意外发送透明交易。此功能是门罗币独有的。您不需要信任任何其他人来保护您的隐私。"
  q5: 为什么我的钱包同步需要这么长时间？
  a5: 如果您在本地运行完整的 @node，您需要将整个 @blockchain 复制到您的计算机上。这可能需要很长时间，尤其是在旧硬盘或慢速互联网连接上。如果您使用 @remote-node，您的计算机仍然需要请求所有输出的副本，这可能需要几个小时。请耐心等待，如果您愿意为更快的同步时间牺牲一些隐私，请考虑使用远程节点或轻量级 @wallet。
  q6: 轻钱包和普通钱包有什么区别？
  a6: 对于轻钱包，您将查看密钥提供给节点，节点会代表您扫描区块链并查找您账户的传入交易。此节点会知道您何时收到钱，但不会知道您收到了多少、从谁那里收到的或您要发送给谁。根据您的钱包软件，您可能能够使用您控制的节点以避免隐私泄露。为了更多隐私，请使用普通钱包，它可以与您自己的节点一起使用。
  q7: 门罗币与比特币有何不同？
  a7: 门罗币不是基于比特币的。它基于 CryptoNote 协议。比特币是一个完全透明的系统，人们可以准确看到从一个用户发送到另一个用户的金额。门罗币隐藏此信息以保护所有交易中的用户隐私。它还具有动态 @block 大小和动态费用、抗 ASIC 的工作量证明（@randomx）和 @tail-emission，以及其他几项变化。
  q8: 门罗币有区块大小限制吗？
  a8: 不，门罗币没有硬 @block 大小限制。相反，区块大小可以根据需求随时间增加或减少。它被限制在一定的增长率内以防止过度增长（@scalability）。
  q11: 什么是可互换性，为什么它很重要？
  a11: "@Fungibility 是货币的一个简单属性，即相同价值的两个金额之间没有区别。如果两个人交换一张 10 元和两张 5 元，那么没有人会吃亏。然而，假设每个人都知道那张 10 元之前用于勒索软件攻击。另一个人还会进行交易吗？可能不会，即使持有 10 元的人与勒索软件没有联系。这是一个问题，因为接收金钱的人需要不断检查他们收到的钱，以免最终得到被污染的币。门罗币具有可互换性，这意味着人们不需要经历这种努力。"
  q12: 如果门罗币如此私密，我们如何知道它们不是凭空创造的？
  a12-1: 在门罗币中，每个 @transaction 输出都与一个密钥镜像唯一关联，该密钥镜像只能由该输出的持有者生成。被使用多次的密钥镜像会被矿工作为双重支付拒绝，无法添加到有效的 @block 中。当收到新交易时，矿工会验证密钥镜像之前是否已存在于之前的交易中，以确保它不是双重支付。
  a12-2: 我们还可以知道交易金额是有效的，即使您花费的输入值和您发送的输出值是加密的（这些对除接收者之外的所有人都是隐藏的）。因为金额使用 @Pedersen-commitments 加密，这意味着没有观察者可以知道输入和输出的金额，但他们可以对 Pedersen 承诺进行数学运算，以确定没有门罗币凭空创造。
  a12-3: 只要您创建的加密输出金额等于正在花费的输入总和（包括接收者的输出和返回给您自己的找零输出以及未加密的交易费），那么您就有一个合法的交易，并且知道没有门罗币凭空创造。Pedersen 承诺意味着总和可以被验证为相等，但总和的门罗币价值以及单独的输入和输出的门罗币价值是无法确定的。
  aabout-auditability: 关于供应可审计性的更多信息
  adetailed-auditability: 供应可审计性的深入分析
  q13: 门罗币是魔法，无论我做什么都能保护我的隐私吗？
  a13: 门罗币不是魔法。如果您使用门罗币但将您的姓名和地址告诉另一方，另一方不会神奇地忘记您的姓名和地址。如果您泄露了您的密钥，其他人会知道您做了什么。如果您受到攻击，其他人将能够记录您的按键。如果您使用弱密码，其他人将能够暴力破解您的密钥文件。如果您在云端备份种子，您很快就会变穷。
  q14: 门罗币 100% 匿名吗？
  a14: 不存在 100% 匿名的东西。如果没有别的，您的匿名集就是使用门罗币的人群。有些人不使用门罗币。门罗币也可能有漏洞。即使没有，现在或以后可能存在通过门罗币的隐私层推断某些信息的方法。攻击只会变得更好。如果您系安全带，您仍然可能在车祸中死亡。使用常识、谨慎和深度防御。
  q15: 门罗币是混币器或混币服务吗？
  a15: 不是。门罗币使用完全非交互式、非托管式和自动的流程来创建私密交易。相比之下，对于混币服务，用户选择加入参与。
  qwallet: 我应该使用什么钱包？
  awallet: 有多种钱包可用于大量平台。在本网站上，您会找到核心团队发布的钱包（GUI 和 CLI）以及广受信任且开源的第三方桌面和移动钱包列表。
  qnofunds: 我看不到我的资金。我刚刚失去了所有门罗币吗？
  anofunds: "您可能没有。很难简单地'丢失'您的币，因为从技术上讲它们无处可寻。您的币'存在'于区块链上，并通过密码学保护的公钥和私钥系统链接到您的账户。这就是为什么如果您看不到您的资金，可能是因为技术问题。查看本页顶部的'资源与帮助'部分，获取有用资源列表，这些资源将帮助您识别和解决问题。"
  qnodetor: 如何通过 Tor 连接我的节点？
  anodetor: 对 Tor 的支持仍处于初期阶段，但已经可以通过网络本地发送交易并在 Tor 网络上运行门罗币 @daemon。更好的 Tor 和 I2P 集成正在进行中。
  qfullpruned: 如何决定是运行完整节点还是修剪节点？
  afullpruned: "完整 @node 需要相当大的存储空间，下载和验证整个区块链可能需要很长时间，尤其是在较旧的硬件上。如果您的存储空间有限，建议使用修剪节点。它仅存储 1/8 的不必要区块链数据，同时保留完整的交易历史。如果有足够的存储空间，建议使用完整节点，但修剪节点仍然对网络有很大贡献并改善您的隐私。"
  qblocksize: 门罗币区块链有多大？
  ablocksize: "门罗币 @blockchain 始终在增长，因此没有固定大小。截至 2024 年，完整区块链约为 ~225GB。修剪的区块链约为 ~86GB。查看门罗币百科条目 @pruning 了解完整和修剪区块链之间的区别。"
  qblockspace: 为什么区块链需要这么多空间？
  ablockspace: "当您下载 @blockchain 时，您正在下载自门罗币网络创建以来发生的 @transactions 的整个历史。交易和相关数据很大，每个节点都必须保留整个历史以确保每个人都相同。@Pruning 区块链允许运行仅保留 1/8 的非严格必要区块链数据的节点。这导致区块链比完整区块链小 2/3。对于磁盘空间有限的人来说很方便。查看门罗币百科条目 @node 和 @remote-node 了解更多详情。"
  qavoidbc: 我可以避免下载整个区块链吗？
  aavoidbc: "是的。您不需要下载 @blockchain 即可在网络上进行交易。您可以连接到 @remote-node，它会为您存储区块链。所有最常见的 @wallets（包括 GUI 和 CLI）都允许使用远程节点在网络上进行交易。有多种方式可以利用此功能。例如，GUI 和 CLI 提供'引导节点'功能，允许人们下载自己的区块链，同时使用远程节点立即使用网络。不断探索改善门罗币网络可用性的方法。"
  qscanned: 为什么每次打开钱包都需要扫描？
  ascanned: 大约每 2 分钟会向 @blockchain 添加一个新的 @block。您的钱包需要扫描这些区块以查找属于它的 @transactions。使用轻钱包（也称为远程同步钱包）时，此过程不是必需的。对于轻钱包，远程服务器（可能由您管理）代表您进行扫描。
  qdangernode: 运行个人节点危险吗？
  adangernode: "运行个人 @node 是与门罗币网络交互的最安全方式，因为您完全控制，不需要依赖第三方。从一般角度来看，运行节点并不危险，但请记住，您的 ISP 可以看到您正在运行门罗币节点。"
  qdangerrnode: 使用远程节点危险吗？节点操作员可以从我这里获得什么数据？
  adangerrnode: "始终建议，特别是对于注重隐私的用户，在网络上进行交易时使用个人节点以实现最高的隐私率。有些人为了方便更喜欢使用不受其控制的 @remote-node（公共节点）。不必处理 @blockchain 个人副本的便利是有代价的：隐私降低。远程节点操作员能够看到交易来自什么 IP 地址（即使无法看到接收者或金额），在某些极端情况下，可以进行能够降低您隐私的攻击。通过在 Tor 或 I2P 网络上使用远程节点或使用 VPN 可以减轻一些危险。"
  qantivirus: 为什么我的杀毒软件/防火墙将我刚下载的门罗币软件标记为恶意软件？
  aantivirus: 下载门罗币软件（GUI 和 CLI）后，您的杀毒软件或防火墙可能会将可执行文件标记为恶意软件。有些杀毒软件只是警告您可能的威胁，其他杀毒软件会静默删除您下载的 @wallet / @daemon。这很可能是因为集成的矿工，它用于挖矿和 @block 验证。一些杀毒软件可能错误地将矿工视为危险软件并采取行动删除它。
  aantivirus1: 正在讨论该问题并制定解决方案。同时，如果您收到杀毒软件的警告，请确保您下载的软件是合法的（请参见下面链接的指南），然后在杀毒软件中为其添加例外，这样就不会被删除或阻止。如果您需要帮助，请随时联系社区。
  qmoneromeaning: "为什么门罗币被称为'Monero'？"
  amoneromeaning: "Monero 是世界语单词，意思是'硬币'。最初门罗币被称为'Bitmonero'，在世界语中翻译为'比特币'。社区决定从原始维护者分叉后，'bit'被删除，改为简单的'Monero'。"
  qimporting: 我可以手动导入区块链吗？
  aimporting: >
    是的，您可以，但您可能不应该。导入外部 @blockchain 非常占用资源，并迫使您信任为您提供区块链的实体。通常以正常方式下载更快：运行节点并让它与网络中的其他 @nodes 同步。如果您使用 Windows，请遵循下面的指南。如果您是 Linux 用户，可以使用"monero-blockchain-import"工具，该工具包含在下载 GUI 或 CLI 钱包时的存档中。使用此命令开始同步导入的区块链："monero-blockchain-import --input-file blockchain.raw"。
  qhf: 门罗币真的每 6 个月进行一次硬分叉吗？
  ahf: 门罗币曾经每年进行 2 次网络升级（硬分叉），但现在不再是这样。选择双年硬分叉是为了能够引入重要的共识变更，这些变更添加了隐私功能和网络范围的改进（例如 @bulletproofs 和 CLSAG 都需要硬分叉）并避免协议僵化。最近，双年硬分叉包括对 PoW 算法的更改，以保持抗 ASIC 性。
  ahf1: 开发社区和核心团队一致认为协议足够稳定和成熟，不再需要双年硬分叉。此外，门罗币周围的生态系统在这些年中呈指数级增长，频繁的协议更改将越来越难以协调，可能不利于生态系统的增长和用户体验。锦上添花的是，新算法 @RandomX 正在确保长期抗 ASIC 性，因此不再需要定期更改。网络升级仍将用于添加重要的协议改进和共识更改，但频率较低且不那么严格（每 9-12 个月）。最后一次硬分叉是在 2022 年 8 月 13 日。
  qvideos: 有我可以观看的视频来了解门罗币吗？
  avideos: >
    多年来，社区创建了大量信息内容，如文章和视频。其中大部分视频在 YouTube 等平台上公开提供。在本网站上，我们托管了一些解释门罗币基础知识的视频。为了优化其有效性，应按顺序观看它们：
  video_intro: 门罗币简介
  video_essentials: 基础知识
  video_sa: 隐身地址
  video_ringsig: 环签名
  video_ringct: 环机密交易
  fcmp: 全链成员证明
  mvideos: "门罗币百科条目中的更多信息："
  aavailable: 也可用于
  and: 和
  qlongtimemove: 我很长时间没有使用我的门罗币了，我是否因为硬分叉（网络升级）而丢失了我的币？
  alongtimemove: 不用担心，您的币是安全的。要能够使用它们，您只需下载并运行最新的门罗币软件。您可以使用之前保存的 @mnemonic-seed 随时恢复您的钱包。请注意，门罗币中的硬分叉是预定的且无争议的。这意味着不会创建新币。
  qvuln: 门罗币有已知的漏洞吗？
  avuln: >
    门罗币社区创建了一系列名为"Breaking Monero"的视频，其中探索和讨论了潜在的门罗币漏洞。有 14 个视频，每个探索不同的主题。查看 <a href="https://www.youtube.com/playlist?list=PLsSYUeVwrHBnAUre2G_LYDsdo-tD0ov-y">YouTube 上的播放列表</a>。
  vulnspotify: 在 Spotify 上作为播客提供
  qasicresistance: "什么是抗 ASIC？为什么它很重要？"
  aasicresistance: ASIC 基本上是专门为做一件工作而创建的特殊计算机，与为通用目的而制造的普通计算机相反。这个特性使 ASIC 在 @mining 方面非常高效。
  aasicresistance1: 问题是这些设备非常昂贵，只有少数人能够负担得起。这导致少数实体拥有网络的大量算力，这对网络本身的安全性构成严重威胁。例如，如果大型 ASIC 操作员串通并设法获得网络的大部分算力，他们可以任意拒绝交易。
  aasicresistance2: >
    门罗币通过抗 ASIC 解决了这个问题：它使用一种算法（@randomx），大大降低了 ASIC 的效率，使其无利可图。矿工可以使用普通消费级硬件，这允许他们公平竞争。门罗币网络目前由数千名使用'常规'计算机的矿工保护。这导致网络更难攻击，没有矿工比其他矿工有显著优势（他们都使用或多或少相同的硬件）。
  qmaxsupply: 门罗币的最大供应量是多少？
  amaxsupply: 门罗币有固定的发行率，而不是设定的最大供应量。门罗币尾部发行从区块 2641623 开始，于 2022 年 6 月 9 日 00:29 UTC，并将永久保持在每分钟 0.3 XMR（每 @block 0.6 XMR）。这在第一年约为 1% 的通货膨胀率，未来几年将接近 0% 的通货膨胀率。这个 @tail-emission 允许永久激励来保护门罗币，即使在遥远的未来，同时保持通货膨胀率非常低。
  qtailemission: 为什么门罗币没有最大供应量？
  atailemission: 矿工通过 @mining 区块在门罗币网络上处理交易。@block 的矿工获得 .6 XMR 的恒定区块奖励，以及在该区块中有交易的用户的 @transaction 费用。门罗币有区块奖励而不是仅依赖交易费用，以激励矿工继续用他们的算力保护网络，并保持交易费用低。
  atailemission1: 这个恒定区块奖励导致的 @tail-emission 创造了低于 1% 的通货膨胀率，随着时间的推移趋向于 0%。货币的固定发行确保人为腐败不能过度膨胀供应。保持网络可预测、去中心化和安全。


mining:
  intro1: 门罗币是一种依赖工作量证明挖矿来实现分布式共识的加密货币。以下是一些关于如何开始挖矿的信息和资源。
  intro2: 门罗币项目不认可任何特定的矿池、软件或硬件，以下内容仅供参考。
  pow: 工作量证明
  philosophy: >
    门罗币的哲学之一是维持平等挖矿，让每个人都有挖矿的可能性。为了实现这一点，门罗币使用由门罗币社区成员构思和开发的特殊算法：@RandomX。这个 PoW 算法抗 ASIC，这意味着无法构建专用硬件来挖掘门罗币。矿工必须使用消费级硬件并公平竞争。
  efficiency: 门罗币可以由 CPU 和 GPU 挖掘，但前者效率要高得多。
  miningset: 独立或矿池挖矿
  miningsetp: >
    矿工可以决定是喜欢独立挖矿还是在矿池中挖矿。每种方法都有其优点和缺点，但门罗币项目鼓励个人使用门罗币软件（<a href="https://www.getmonero.org/downloads/#gui">GUI</a> 和 <a href="https://www.getmonero.org/downloads/#cli">CLI</a>）进行独立挖矿，因为这种类型的独立挖矿是增强门罗币网络鲁棒性的最有效方式。也鼓励使用 P2Pool 挖矿。
  procons: "独立和矿池挖矿的优缺点："
  solo: 独立
  prosecure: 使网络比在矿池中挖矿更安全
  prowallet: 您可以使用门罗币钱包挖矿。无需额外软件
  conlong: "根据您的算力，可能需要数月才能找到一个区块。这通常被称为'抽奖'"
  pool: 矿池
  propay: 频繁支付。您将根据您在所选矿池中的参与程度获得 XMR。
  conopfee: 您必须向矿池运营商支付费用
  conminfee: 您只能使用第三方软件进行矿池挖矿，这可能会占用您一小部分份额
  conpolcent: 太多人在单个矿池上挖矿可能导致矿池拥有 >50% 的总算力，这很危险
  choosepol: "如果您需要帮助选择矿池或只是想了解更多信息，请使用："
  hardware: 硬件
  hardwarep: 门罗币可以在 CPU 和 GPU 上挖掘，但后者的效率远低于前者。您可以使用 <a href="https://xmrig.com/benchmark">xmrig 基准页面</a>了解您的硬件与其他硬件相比的性能（某些结果可能已过时）。
  software: 软件
  softwarep: >
    在挖矿软件方面有多种选择。如前所述，要进行独立挖矿，可以使用 CLI 或 GUI 钱包（仅 CPU）。如果您想在矿池中挖矿或使用 GPU 挖矿，您需要专用软件。支持门罗币的矿工：
  software_para: 请注意，某些矿工可能有开发者费用。
  support: 支持
  supportp: 如果您有问题或只是想与其他矿工交流，请来门罗币挖矿聊天。在 <a href="https://matrix.to/#/%23xmrmine:matrix.org">Matrix</a> 和 <a href="irc://irc.libera.chat/#monero-mining">Libera</a> 上。
  p2poolh: "P2Pool：独立和矿池挖矿的最佳结合"
  p2poolnew: >
    P2Pool 是一种巧妙的新型门罗币挖矿方式，允许矿工获得矿池提供的频繁支付，而无需信任中心化矿池。P2Pool 是一个点对点挖矿池，让矿工完全控制他们的门罗币节点及其挖掘内容。更多详情请参见 <a href="/2021/10/05/p2pool-released.html">公告帖</a>。
  p2poolp: >
    P2Pool 是门罗币的侧链，P2Pool 区块可能是门罗币区块。每个矿工提交包含对同时挖矿的所有矿工（当前在 PPLNS 窗口中有份额的矿工）的支付的区块模板。高质量的区块模板作为区块添加到 P2Pool 区块链；这些计为找到它们的矿工的"份额"。
  p2poolfeatures: 主要功能
  p2pdecentralized: <b>去中心化：</b>没有可以关闭/阻止/恶意的中央服务器。
  p2ppermissionless: <b>无需许可：</b>任何人都可以加入侧链，并且实际上无法审查个别矿工。
  p2ptrustless: <b>无需信任：</b>没有矿池钱包；资金从不托管。所有矿池区块立即向矿工支付。
  p2pplns: <b>PPLNS</b> 支付方案
  p2pzerofee: 0% 费用
  p2pzeropayout: <b>0 XMR</b> 支付费用
  p2pminpayout: 低于 0.0004 XMR 最低支付
  p2pmoreinfo: "项目 GitHub 仓库上的更多信息和详情："

what-is-monero:
  need-to-know: 您需要知道什么
  leading: 门罗币是专注于私密和抗审查交易的领先加密货币。
  leading_para1: 大多数现有的 @cryptocurrencies，包括比特币和以太坊，都有透明的 @blockchains。@transactions 可以被世界上任何人验证和/或追踪。这意味着这些 @transactions 的发送和接收 @addresses 可能与现实世界的身份相关联。
  leading_para2: 另一方面，门罗币使用各种技术来确保其用户的隐私。
  confidential: 门罗币交易是保密且无法追踪的。
  confidential_para1: "与选择性透明的替代方案（例如 Zcash）不同，门罗币是唯一一种默认情况下每个用户都是匿名的主要加密货币。每笔交易的发送方、接收方和金额都通过使用三种重要技术隐藏：@Stealth-Addresses、@Ring-Signatures 和 @RingCT。"
  confidential_para2: 因为每笔交易都是私密的，门罗币无法被追踪。这使其成为真正的 @fungible 货币。接受门罗币的商户和个人不需要担心黑名单或被污染的币。
  grassroots: 门罗币是一个草根社区，吸引世界上最好的加密货币研究人员和工程人才。
  grassroots_p1: 门罗币项目处于加密货币隐私和安全的前沿。其
  grassroots_p2: 研究实验室
  grassroots_p3: 和开发团队不断致力于新的创新技术。自推出以来，该项目已收到来自全球
  grassroots_p4: 500 多名开发者
  grassroots_p5: 的贡献。
  grassroots_p6: 众多
  grassroots_p7: 论坛和聊天频道
  grassroots_p8: 可供任何人加入，社区始终欢迎新成员。
  electronic: 门罗币是电子现金，允许快速、廉价地向世界任何地方付款和收款。
  electronic_para1: 使用门罗币，没有电汇或支票清算费用，没有多天的持有期，也没有欺诈性退单。因为门罗币是去中心化的，它不受任何特定法律管辖区的约束，并提供免受资本管制的安全。
  videos: 门罗币视频（英文）
  aboutb: 关于
  walletb: 获取钱包
  getb: 获取门罗币
  joinb: 加入工作组

about:
  history: 简史
  history_para1: 门罗币于 2014 年 4 月推出。这是 CryptoNote 参考代码的公平、预先宣布的推出。没有预挖或瞬间挖矿，区块奖励的任何部分都不归开发。请参见原始 Bitcointalk 主题
  history_para2: 这里。
  history_para3: 创始人 thankful_for_today 提出了一些社区不同意的有争议的变更。发生了争执，门罗币核心团队分叉了项目，社区跟随了这个新的核心团队。自那时起，这个核心团队一直提供监督。
  history_para4: 门罗币自推出以来进行了多项重大改进。区块链被迁移到不同的数据库结构以提供更高的效率和灵活性，设置了最小环签名大小，以便所有交易都是强制私密的，并实施了 RingCT 以隐藏交易金额。几乎所有改进都提供了安全性或隐私性的改进，或者促进了使用。门罗币继续以隐私和安全为首要目标，易用性和效率为次要目标发展。
  values: 我们的价值观
  values_para: 门罗币不仅仅是一项技术。它也是技术所代表的东西。以下列出了一些重要的指导理念。
  security: 安全
  security_para: 用户必须能够信任门罗币及其交易，没有错误或攻击的风险。门罗币向矿工提供全额区块奖励，他们是提供此安全性的网络中最关键的成员。交易使用可用的最新和最具弹性的加密工具进行加密保护。
  privacy: 隐私
  privacy_para: 门罗币非常重视隐私。门罗币需要能够在法庭上保护用户，在极端情况下，免受死刑。这种级别的隐私必须完全可供所有用户访问，无论他们在技术上是否有能力或对门罗币的工作原理一无所知。用户需要以这样的方式自信地信任门罗币，即他们不会因为担心其他人发现而被迫改变他们的消费习惯。
  decentralization: 去中心化
  decentralization_para: 门罗币致力于在网络安全和代码开发方面提供最高程度的去中心化。其工作量证明算法防止专用挖矿硬件主导网络，并允许公平分配区块奖励。此外，门罗币的开发和研究通过全球协作进行，项目以最大透明度进行。每个开发决策都对公开讨论开放，每个主要开发者会议都在线发布。

