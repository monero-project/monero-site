accepting:
  title_gui: 图形界面的说明
  index: 索引
  gui1: "使用图形界面接受付款非常简单。无论您是商户还是用户，您都有两个可用页面：接收和商户。"
  gui2: 接收页面（如下所示）的详细说明
  guilinkguide: 在图形界面指南中。
  guiinstructions: >
    要接收 XMR，您只需向付款人提供一个 @address，他们可以将资金发送到该地址。大多数情况下，只需分享二维码并让付款人扫描，而不是复制粘贴字母数字字符串更容易。
    使用图形界面，每个生成的地址都带有二维码。让对方用手机上的门罗币 @wallet 扫描二维码，几分钟内接收您的 XMR。
    请记住，您可以生成任意数量的地址（子地址）。如果您出于任何原因想要将资金分开，这很有用。
  guimerchant: 商户可能会发现使用"商户"页面（下面的截图）更方便，该页面在
  guilinkguide1: 上述链接指南
  guimerchant1: >
    这是一个类似 POS 的页面，商户可以轻松使用来设置要接收的 XMR 金额。如果启用了"销售跟踪器"选项，
    您将实时看到付款到达您的钱包，以及确认数量。
  guisteps: "这两个页面让每个人都可以通过以下步骤轻松接收 XMR："
  guiol: "转到「接收」页面并创建/选择您想要接收币的地址。"
  guiol1: 与您想要接收币的人分享由字母和数字组成的地址。您可能更喜欢使用更用户友好的二维码。
  guiol2: "如果您想指定要接收的金额，请转到「商户」页面（在「接收」页面中选择将用于接收 XMR 的 @account 后）。"
  guiol3: "插入要接收的金额，然后与付款人分享付款 URL 或二维码。如果您想实时跟踪付款，请勾选「启用销售跟踪器」选项。"
  guiol4: 等待付款到达并有足够的确认（确认越多，交易越安全。您至少需要 10 次确认才能使用资金）。
  cliinstructions: 命令行的说明
  clicreatewallet: >
    当您第一次创建钱包时，会自动向您显示一个 @address。这是您的主地址。
    如果您愿意，您可以简单地使用该地址接收付款。您应该关心谁知道此地址（因为不同位置的一个地址可以关联），
    但您不需要担心区块链观察者像比特币一样观察此地址的交易。朋友可以向同一地址发送交易而不会降低隐私。
  cliaccounts: >
    如果您愿意，您可以有更多控制权。门罗币提供了创建多个账户的可能性，每个账户包含多个子地址，
    如果您想控制多个账户，这很有用。例如，您可能想要一个 @account 用于接收捐赠，另一个用于日常使用。
    这将允许您轻松监控"捐赠"账户的资金流入，而不会与您的主账户混淆。
  clicreateaccount: "要创建账户，只需运行此命令："
  clicreateaccount1: 现在您有了另一个与主账户分开的账户。您可以随时在账户之间切换。
  cliindex: >
    如您从上图中看到的，每个账户都有一个索引号，您可以使用命令
    `account switch [index]` 在账户之间切换。例如，使用上图作为参考，如果您想切换到"捐赠"账户来监控它，
    您可以通过给您的 CLI 此命令 `account switch 1` 来实现。现在您在您的"捐赠"账户上，可以立即开始使用它。
  cliindex1: >
    每个账户可以托管几乎无限数量的子地址。它们的工作方式与普通地址完全相同，您可以创建任意数量
    并使用它们接收 XMR 到它们链接的账户。要为账户创建新的子地址，请使用命令：
  clinotes: >
    请注意，下面的说明只是创建和使用账户/子地址所需的最低限度。
    CLI 提供了更精细的方式来处理账户和一般钱包。使用"help"命令列出所有可用选项。
  merchantstitle: 商户说明
  merchantsreceive: 如果您是企业，希望以编程方式接收 @transactions 或使用多重签名等高级功能，建议查阅
  merchdevguides: 开发者指南
  merchantsreceive1: "如果您需要支持，社区将始终乐意提供帮助。来 #monero 聊天，聊天室在 Freenode 上，但也中继到 MatterMost 和 Matrix。"
  merchantsint: "如果您不想直接处理钱包，可以使用第三方支付系统。门罗币社区成员为各种平台和语言创建了一套集成。您可以在"
