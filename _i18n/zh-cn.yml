  supportdev: 支持开发者
  supportdev_p: 致力于门罗币的开发者大多是独立志愿者，但其中一些可能通过 CCS 提案获得资金。如果您希望通过捐赠一些 XMR 来支持他们的努力，请考虑直接联系他们或使用打赏服务。
