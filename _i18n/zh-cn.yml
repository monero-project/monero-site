contributing:
  intro: 门罗币是一个开源的、社区驱动的项目。以下描述了支持该项目的几种方式。
  network: 支持网络
  develop: 开发
  developp: "门罗币是开源且无需许可的；欢迎并鼓励贡献者。开发者可以通过多种方式为不同项目做出贡献："
  cli: "CLI 钱包和守护进程："
  cli_p: 核心钱包，主要用 C++ 编写。
  gui: "GUI 钱包："
  gui_p: 主要是 QML 和 C++。
  website: "本网站："
  website_p: 使用 Jekyll 构建。无 Javascript。
  bug: "漏洞和脆弱性狩猎：门罗币在 Hackerone 上列出，开发者被要求负责任地披露漏洞和脆弱性。请参见"
  discl: 门罗币项目脆弱性响应流程。
  develop_descr: >
    此列表仅包括核心团队管理的工具，但门罗币生态系统要广泛得多。人们可以为库、服务、文档、图形等的开发做出贡献。列表实际上是无限的。联系或加入您想要贡献的工作组。
  develop_wg: 查看门罗币工作组。
  full-node: 运行节点
  full-node_p: 帮助门罗币网络的一种简单有效的方式是运行 @node。节点确保网络保持安全和去中心化运行。一个简单的完全同步节点足以帮助网络，但如果您想做得更多，您可以运行开放的 @remote-node，以允许其他人连接到它。
  full-node_p2: "我们有几份指南可以帮助您运行和配置节点："
  allguides: 查看所有用户指南。
  mine: 挖矿
  mine_p: >
    挖矿确保网络的安全。门罗币使用 @randomx，一种由门罗币贡献者开发的抗 ASIC 算法，旨在保持可由普通消费级硬件挖掘。有关挖矿的更多信息，请参见
  mine_link: 专门的挖矿页面。
  ffs: 社区众筹系统
  ccs_p: 门罗币利用社区众筹系统，通过该系统提出开发项目并由社区资助。资金托管，一旦达到编程里程碑，就会向开发者汇款。任何人都可以生成新提案或资助现有提案。
  ccsbutton: 前往 CCS
  donate: 捐赠
  donate_p: 向一般基金的捐赠在紧急情况或需要时使用。基础设施成本目前由赞助商覆盖。
  genfund: 一般基金
  genfund_p: "您可以捐赠门罗币和比特币："
