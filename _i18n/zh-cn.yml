home:
  heading: Monero 意为金钱
  heading2: 私密、去中心化的加密货币，保证您财务隐私与安全。
  whatis: 了解更多关于门罗币的信息
  about: 关于门罗币
  joincommunity: 加入社区
  choosewallet: 选择钱包
  choosewallet_para: 要使用门罗币，首先需要一个钱包。访问我们的下载页面，选择适合您的钱包。门罗币钱包适用于多种平台，包含立即使用门罗币所需的一切。
  downloads: 下载
  getcoins: 获得门罗币
  getcoins_para: 安装钱包后，您需要获得一些门罗币。有多种方式可以获得门罗币，比如挖矿或工作换取门罗币，但最简单的方式是使用交易所，将您的法定货币兑换成 XMR。许多中心化和去中心化交易所都支持门罗币（XMR）。
  exchanges: 交易所
  useit: 这是一种货币，尽情使用它吧！
  useit_para: 门罗币是一种货币，可以用来交换商品、服务和其他货币，私密且手续费极低。许多实体乐意接受 XMR 作为支付方式；请查看我们的"商户"页面。
  merchants: 商户
  answers: 寻找问题的答案
  faq: 常见问题
  faq_para: 多年来我们听到了很多问题，并整理了一份详尽的常见问题解答。如果您的问题不在其中，您随时可以咨询社区。
  guides: 指南和资源
  guides_para: >
    社区汇集了大量资源和文档。用户可以在"用户指南"部分找到关于常见配置和技巧的有用信息和指南。开发者可以在"开发者指南"中找到构建基于门罗币的服务或与网络通信所需的一切。资料库提供免费下载的出版物和书籍，包括完整的《精通门罗币》和《从零到门罗币》书籍。
  moneropedia_para: 您想查找门罗币中使用的术语和概念的含义吗？这里您会找到按字母顺序排列的术语及其含义指南。
  moneropedia_button: 阅读门罗币百科
  contributecommunity: "我们需要您的技能：贡献吧！"
  contributecommunity_para: 门罗币不仅仅是一种货币，它是一个去中心化社区，只因数百位将时间奉献给项目的志愿者而存在。加入我们！
  researchlab_para: MRL（门罗币研究实验室）是门罗币非常重要的一部分。来自全世界的研究者和密码学家聚在一起寻找改进门罗币的新方法。阅读他们的论文，加入他们！
  visitmrl: 访问 MRL
  contributing: 贡献
  meetcommunity: "认识社区！"
  meetus: "门罗币社区的成员遍布世界各地。您可以在多个平台上找到我们。来认识我们吧！"
  hangouts: 社区聚集地
  morevideos: 想要更多解释性视频？

hangouts:
  intro: 门罗币社区多元且多样化。我们来自世界各地，但我们确实有一些喜欢一起闲逛的地方。您会在下面找到其中大部分。加入我们！
  resources: 工作组资源
  resources_para: 正在寻找工作组？查看我们的工作组页面。
  irc-matrix: IRC/Matrix 频道
  irc_para: 门罗币社区使用大量 IRC 和 Matrix 频道，每个频道都有不同的用途。有些用于工作，有些只是闲逛。您会在下面找到最受欢迎的频道。
  bridges: 这些频道桥接到许多其他平台，允许社区使用他们喜欢的聊天服务/协议进行交流。
  matrixspace: Matrix 用户可以加入我们的 <a href="https://matrix.to/#/%23monerospace:monero.social">Monero space</a> 查看频道的完整列表。
  mailing_list: 邮件列表
  mailing_list1: 您想直接在电子邮件地址接收重要公告吗？加入我们的邮件列表！
  subscribe: 订阅
  matrixtutorial: 我们提供了一份分步指南：<a href="/resources/user-guides/join-monero-matrix.html">通过 Element 加入门罗币社区 Matrix 服务器</a>
  irc_channels:
    monero: 此频道用于讨论所有与门罗币相关的事情。
    monero-community: 此频道供门罗币社区聚集和讨论想法。
    monero-markets: 我们使用此频道讨论门罗币和其他币的价格。
    monero-offtopic: 与其他门罗币用户聊天，讨论与门罗币无关的事情。
    monero-mining: 这是挖矿问题和讨论的地方。
    monero-support: 您可以在此频道从有经验的用户那里获得支持和提问。请记住；门罗币没有官方支持，没有人会索要您的私钥，<a class="ext-noicon" href="https://dontasktoask.com/" target="_blank" rel="noreferrer noopener">不要问是否可以提问</a>。

merchants:
  descr: 在此页面上，您会找到接受门罗币作为支付方式的商店和商户，以及交易门罗币与其他货币的交易所。
  useit: "接受门罗币的商户"
  use: 多年来，各类商户逐渐认识到门罗币带来的金融隐私价值。事实上，商户采用率正在持续上升。
  dirdescr: "如果您正在寻找使用门罗币的地方，下面的目录提供了一些选项。请记住在信任他们处理您的资金之前做好自己的研究："
  descrp2p: 交换门罗币与其他货币的好方法是使用点对点 [P2P] 交易所。P2P 交易所允许交易者直接互动，在某些情况下无需信任第三方（除了提供托管服务）。这些交易所通常比中心化和/或托管式交易所更加私密。
  swapsdescr: "使用原子交换（Atomic Swaps）是一种无需信任的门罗币与其他加密货币交换方法。更多信息请参见博客文章："
  bisqdescr: 基于比特币和 Tor 的去中心化 P2P 交易所。
  cardfoss: "开源："
  cardkyc: "<b>无 KYC</b>（无需身份验证）："
  cardbtcfiat: (可进行 BTC &#8596; 法币交易)
  cardonion: "洋葱地址："
  cardi2p: "I2P 地址："
  noncustodial: "非托管式："
  locmondescr: 提供点对点交易的在线 P2P 交易所。
  depsell: 取决于卖家
  locnojs: (但提供无 JS 版本)
  simpleswapdescr: 非托管式即时交换所。
  disclaimer: |
    "请注意：这些链接仅为方便和信息目的而提供；它们不构成门罗币社区对所列公司、组织或个人的任何产品、服务或意见的认可。门罗币社区对这些外部网站的准确性、合法性或内容不承担责任。有关其内容的问题请联系外部网站。一如既往，买者自负；您有责任进行自己的研究。在线购物时始终保持判断力。"
  visitbisq: 访问 Bisq
  centrexchanges: 中心化交易所 (CEXs) 和兑换服务
  centrexchangesp: 如果您更喜欢使用中心化交易所，这里列出了一些知名的中心化交易所和兑换服务。更多交易所支持门罗币，我们在这里仅列出一些信誉良好的。
  cexp: 提供门罗币与法定货币和加密货币交换的中心化交易所。
  swappersp: 兑换服务让用户可以将 XMR 兑换成其他加密货币。
  basicswapdexdesc: 去中心化 P2P 原子交换，专注于用户体验。
  visitbasicswapdex: 访问 BasicSwapDEX
  setreq: 需要设置
  eigenwalletdescr: 使用原子交换将比特币兑换为门罗币。
  visiteigenwallet: 访问 Eigen Wallet
  havenodescr: 基于 Tor 和门罗币构建的去中心化 P2P 交易所。非托管式，可直接进行法币到 XMR 交易。
  visithaveno: 访问 Haveno
  havenonetworks: "活跃网络："

sponsorships:
  intro: 以下企业积极支持门罗币项目将金融隐私带给全世界的目标。我们对他们的贡献感激不尽。如果您想赞助门罗币项目并被列在此页面上，请发送电子邮件至 dev@getmonero.org。
  tari: Tari Labs 赞助本网站使用的 CDN。
  symas: Symas 赞助其 CTO Howard Chu (hyc) 在门罗币代码库上的工作。
  macstadium: MacStadium 赞助一台专用 Mac Mini，用于 Mac 相关开发。
  cakewallet: Cake Wallet 赞助"工具"服务器，包括邮件列表、GitLab、Matrix、Taiga 和 Weblate。
  cypherstack: Cypher Stack 赞助运维人员来维护门罗币基础设施。
  pastsponsors: 过去的赞助商

team:
  introduction: 工作组由社区成员组成，他们联合起来实现共同目标。它们有不同的结构和目标。在此页面上，我们列出了一些更活跃的工作组以及一些入门提示，如果您希望为其中任何一个做出贡献。
  core: 核心团队
  community: 社区工作组
  mrl: 研究实验室
  descr: 描述
  start: 从哪里开始
  contacts: 聊天室和联系方式
  chat: "聊天："
  website: "网站："
  core_descr: 作为项目的管理者，核心团队管理和维护无法避免中心化的基础设施（域名、网站、GitHub 仓库等）。其成员在适当时充当调解人，旨在权衡社区共识，延续使门罗币成为今天成功项目的高质量互动。核心团队不曾也从未接受任何经济补偿。
  core_start: 核心团队是一个封闭的工作组；除非受邀，否则无法加入。
  community_descr: 此工作组供社区用于组织和协调。如果您是非编程人员并希望为门罗币做出贡献，请从这里开始。
  community_start: 开始为此工作组做出贡献的最佳方式是加入聊天室并介绍自己，说明您的兴趣和您愿意为社区提供的技能。
  devworkgroup: 开发工作组
  devworkgroup_descr: "此工作组联合致力于门罗币项目钱包和守护进程的开发人员。它由两个主要部分组成：CLI 团队和 GUI 团队。这些团队使用两个不同的聊天室进行协调。"
  devworkgroup_start: 最好先查看两个仓库的开放问题，了解可以修复或改进的内容。两个代码库，尤其是核心仓库，可能相当具有挑战性，因此建议首先在聊天室中写信介绍自己、您的技能以及您希望贡献的内容。
  chatgeneral: "聊天（通用）："
  chatgui: "聊天（GUI）："
  webworkgroup: 网站工作组
  web_descr: 这个以开发为重点的工作组协调网站的开发。大多数成员也是开发工作组的一部分。网站工作组主要是为了将与网站相关的讨论集中在一个地方。
  web_start: 加入聊天室直接与工作组成员交谈总是一个好主意，但如果您更喜欢自己开始，请查看 GitHub 仓库中的 readme。它包含逐步说明来编辑此网站的每个部分。
  localization: 本地化工作组
  localization_descr: 门罗币最古老的工作组之一，由致力于翻译门罗币相关软件和文档的贡献者组成。强烈建议在开始翻译工作之前联系工作组。
  localization_start: 在聊天室联系工作组或在 GitHub 仓库上开启问题。您也可以立即使用 Weblate 平台开始翻译。只需确保首先阅读翻译者指南。
  locplatform: "本地化平台："
  telegram: "Telegram 聊天："
  mrl_descr: 顾名思义，门罗币研究实验室是专注于门罗币相关研究的工作组。它由寻找改进门罗币协议和功能的科学家组成。使门罗币出色的大多数协议改进，如 CLSAG 和 @Bulletproofs，都是此工作组努力的结果。
  mrl_start: 加入下面的聊天室并说明您的兴趣和技能。研究始终在进行中，有人会为您指明正确的方向。
  space: Monero Space
  space_descr: Monero Space 是一个活跃的、以项目为重点的门罗币工作组，为门罗币社区提供服务。它托管流行资源并组织活动，如 Monero Meet。
  space_start: 可以通过在 Matrix/Libera 上向他们的聊天室写信来联系该工作组。
  mrw: 恶意软件响应工作组
  mrw_descr: 恶意软件响应工作组为多种类型的门罗币相关恶意软件提供资源和实时支持。
  mrw_start: 此工作组的大部分活动发生在 IRC 聊天中。如果您希望贡献，只需加入频道提问或提供支持。
  mpwg: 门罗币政策工作组
  mpwg_descr: 门罗币政策工作组是一个松散组成的个人法定人数，他们有兴趣与监管机构、政策制定者和更广泛的金融服务部门互动，以确保对门罗币组成技术的广泛理解，特别是关于其与不断发展的监管和合规要求的兼容性。
  mpwg_start: 如果您想参与或关注政策讨论，请加入 Matrix/Libera 聊天室。
  nwlb_descr: Seraphis 钱包工作组是一组致力于在门罗币中实现 Seraphis 和 Jamtis 的开发人员，通过开发全新类型的钱包，将大幅改进门罗币的隐私能力和可用性。
  nwlb_start: 该工作组经常开会，并在 Matrix 房间（中继到 IRC）中协调。他们一直在寻找愿意帮助的贡献者。
  docs: 门罗币文档工作组
  docs_descr: 此工作组致力于门罗币及其工具的文档编写。
  docs_start: 您可以加入 IRC 或 Matrix 房间。

downloads:
  intro: 在此页面上，您可以找到并下载门罗币软件的最新可用版本，以及硬件、轻钱包和移动钱包。
  choose: 选择您的下载
  gui: 门罗币图形界面钱包
  cli: 门罗币命令行钱包
  blockchain3: 导入门罗币区块链
  mobilelight0: 移动和轻钱包
  mobilelight: 移动和轻钱包
  hardware: 硬件钱包
  gui_intro: 由门罗币社区开发的开源图形用户界面（GUI）钱包，完全免费使用，适合初学者和高级用户。
  simplemode: 简易模式
  simplemode1: 专为技术水平较低的用户创建，他们只想以最简单、最快捷的方式使用门罗币。打开钱包，自动连接到 @remote-node，发送/接收 XMR，完成！
  advancedmode: 进阶模式
  advancedmode1: 具备您可能需要的所有高级功能。非常适合经验丰富的门罗币用户，他们更喜欢完全控制自己的钱包和节点
  merchantpage: 商户页面
  merchantpage1: 轻松接收 XMR 用于您的业务
  hwcompatible: 兼容硬件钱包
  hwcompatible1: 如 Trezor 和 Ledger
  fiatconv: 应用内法币转换
  fiatconv1: 无需再在线查看您的 XMR 价值
  pruning: 区块链修剪
  pruning1: 磁盘空间不足？只需使用 @pruning 仅下载 1/3 的区块链
  langs: "可用 <b>30 多种语言</b>"
  cli_intro0: 由门罗币社区开发的开源命令行界面（CLI）钱包，完全免费使用，最适合开发人员、中级和高级用户。
  cli_intro: CLI 钱包让您完全控制您的门罗币节点和资金。高度可定制，包括各种分析工具，以及 HTTP RPC 和 0MQ 接口。
  currentversion: 当前版本
  sourcecode: 源代码
  helpsupport: 帮助与支持
  helpsupport1: "提供了钱包每个部分的解释指南："
  helpsupport2: "查看最新版本"
