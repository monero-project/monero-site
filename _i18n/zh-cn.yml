  abstract: 摘要
  introduction: 介绍
  read-paper: 阅读论文
  summary: 总结
  mrlhtp: 理解 ge_fromfe_frombytes_vartime
  mrlhtp_summary: 门罗币使用一种独特的哈希函数，将标量转换为椭圆曲线点。它对于创建密钥镜像特别有用。本文档由 Shen Noether 撰写，将其代码实现（ge_fromfe_frombytes_vartime() 函数）转换为数学表达式。
  mrl1: CryptoNote 2.0 中可追踪性链式反应的注释
  mrl1_abstract: 本研究公告描述了对基于环签名的匿名系统的合理攻击。我们以 Nicolas van Saberhagen 在 2012 年表面上发布的加密货币协议 CryptoNote 2.0 为动机。之前已经证明，隐藏一次性密钥对的不可追踪性可能取决于组成该环签名的所有密钥的不可追踪性。这允许环签名之间的可追踪性链式反应的可能性，如果参数选择不当且攻击者拥有足够比例的网络，则会导致整个网络的不可追踪性严重丧失。然而，签名仍然是一次性的，任何此类攻击仍然不一定会侵犯用户的匿名性。然而，这种攻击可能会削弱 CryptoNote 对区块链分析的抵抗力。本研究公告尚未经过同行评审，仅反映内部调查的结果。
  mrl2: 通过使用 CryptoNote 协议的虚拟货币中的 Merkle 树漏洞进行伪造
  mrl2_abstract: 2014 年 9 月 4 日，对门罗币加密货币网络执行了一次不寻常且新颖的攻击。这次攻击将网络划分为两个不同的子集，它们拒绝接受另一个子集的合法性。这产生了无数影响，其中并非所有影响都是已知的。例如，攻击者有一个短暂的时间窗口，在此期间可能发生某种伪造。本研究公告描述了允许此攻击的 CryptoNote 参考代码中的缺陷，描述了 Tigusoft.pl 的 Rafal Freeman 最初提出的解决方案以及随后由 CryptoNote 团队提出的解决方案，描述了门罗币代码库中的当前修复，并详细说明了违规区块对网络的影响。本研究公告尚未经过同行评审，仅反映内部调查的结果。
  mrl3: 门罗币并不那么神秘
  mrl3_abstract: 最近，基于 CryptoNote 源代码和协议比比特币等协议更复杂的事实，互联网上流传着一些关于 CryptoNote 源代码和协议的模糊恐惧。本说明的目的是试图澄清一些误解，并希望消除围绕门罗币环签名的一些神秘感。我将首先比较 CryptoNote 环签名中涉及的数学（如 [CN] 中所述）与 CryptoNote 所基于的 [FS] 中的数学。之后，我将比较环签名的数学与 CryptoNote 代码库中实际存在的内容。
  mrl4: 改进 CryptoNote 协议中的混淆
  mrl4_abstract: 我们识别了几种可用于降低 CryptoNote 2.0 协议不可追踪性的区块链分析攻击。我们分析了可能的解决方案，讨论了这些解决方案的相对优点和缺点，并建议对门罗币协议进行改进，希望能为加密货币对区块链分析提供长期抵抗力。我们对门罗币的建议改进包括协议级网络范围的最小混入策略 n = 每个环签名 2 个外部输出，两年后协议级将此值增加到 n = 4，以及在过渡期间钱包级默认值为 n = 4。我们还建议使用种子式方法发送门罗币输出。我们还讨论了一种非均匀的、依赖年龄的混入选择方法来减轻此处识别的其他形式的区块链分析，但出于各种原因，我们不对实施提出正式建议。还详细讨论了这些改进后的影响。本研究公告尚未经过同行评审，仅反映内部调查的结果。
  mrl5: 环签名机密交易
  mrl5_abstract: 本文介绍了一种在强去中心化匿名加密货币门罗币中隐藏交易金额的方法。与比特币类似，门罗币是一种通过工作量证明"挖矿"过程分发的加密货币。最初的门罗币协议基于 CryptoNote，它使用环签名和一次性密钥来隐藏交易的目的地和来源。最近，比特币核心开发者 Gregory Maxwell 讨论并实施了使用承诺方案隐藏交易金额的技术。在本文中，描述了一种新型环签名，一种多层可链接自发匿名组签名，它允许以合理的效率和可验证的、无需信任的币生成来隐藏交易的金额、来源和目的地。提供了协议的一些扩展，如聚合 Schnorr 范围证明和环多重签名。作者想指出，本文的早期草稿在门罗币社区和比特币研究 irc 频道上公开。区块链哈希草稿可在 [14] 中获得，显示这项工作始于 2015 年夏季，并于 2015 年 10 月初完成。电子预印本也可在 http://eprint.iacr.org/2015/1098 获得。
  mrl6: 门罗币子地址的高效实现
  mrl6_abstract: 希望以不可链接的方式重复使用钱包地址的门罗币加密货币用户必须维护单独的钱包，这需要为每个钱包扫描传入交易。我们记录了一种新的地址方案，允许用户维护单个主钱包地址并生成任意数量的不可链接子地址。每笔交易只需要扫描一次，以确定它是否发送给用户的任何子地址。该方案还支持向其他子地址的多个输出，并且与传统钱包交易一样高效。
  mrl7: 已花费输出集
  mrl7_abstract: 本技术说明使用基本集合论概括了花费输出的概念。该定义捕获了识别此类输出的各种早期工作。我们量化了这种分析对门罗币区块链的影响，并简要概述了缓解措施。
  mrl8: 双可链接环签名
  mrl8_abstract: 本公告描述了对门罗币可链接环签名方案的修改，允许双密钥输出作为环成员。密钥镜像与双中的两个输出一次性公钥绑定，防止该交易中的两个密钥单独花费。此方法适用于非交互式退款交易。我们讨论了该方案的安全含义。
  mrl9: Thring 签名及其在支付者模糊数字货币中的应用
  mrl9_abstract: 我们提出了用于协作计算环签名的阈值环多重签名（thring 签名），提出了 thring 签名的存在性伪造游戏，并讨论了 thring 签名在数字货币中的用途，包括无需信任设置的机密金额的支付者模糊跨链原子交换。我们提出了 thring 签名的实现，我们称之为可链接自发阈值匿名组签名，并证明该实现是存在性不可伪造的。
  mrl10: 跨组的离散对数相等性
  mrl10_abstract: 本技术说明描述了一种用于证明跨不同组知道相同离散对数的算法。该方案将公共值表示为位的标量表示，并使用一组环签名来证明每个位是一个有效值，该值在两个标量组中相同（达到等价性）。
  iacr2019654: 简洁可链接环签名和对抗性密钥的伪造
  iacr2019654_abstract: 我们证明了一种非诽谤性版本是可链接环签名不可伪造性的自然定义。我们提出了一种具有简洁签名和多维密钥的可链接环签名构造，如果随机预言机的决策性 Diffie-Hellman 问题的变体是困难的，则可链接匿名，如果密钥聚合是单向函数，则可链接，如果离散对数问题的一次多变体是困难的，则非诽谤。我们评论了在无需信任设置的签名者模糊机密交易模型中的一些应用。
  iacr2020018: "Triptych：对数大小的可链接环签名及其应用"
  iacr2020018_abstract: 环签名是一种常见构造，用于在签名时指定的非交互式公钥集中提供签名者模糊性。与早期方法不同，早期方法的签名大小与签名者匿名集的大小成线性关系，当前的最佳解决方案要么需要中心化的信任设置，要么产生对数大小的签名。然而，很少有方法还提供可链接性，这是一种用于确定消息的签名者是否签署了任何先前消息的属性，可能对匿名集选择有限制。在这里，我们介绍了 Triptych，一系列无需信任设置的可链接环签名，基于对开放到零的承诺的零知识证明的泛化。我们通过将构造扩展到独立匿名集中的并行承诺的开放，展示了 Triptych 在签名者模糊交易协议中的应用。签名在匿名集大小上是对数的，虽然验证复杂度是线性的，但证明集合可以批量高效验证。我们表明，对于分布式协议中实用的匿名集大小，Triptych 以直接的构造提供了竞争性能。
  iacr2020312: "Arcturus：机密交易的高效证明"
  iacr2020312_note: "注意：本论文已被撤回，但可以通过点击'本报告的所有版本'查看。"
  iacr2020312_abstract: 机密交易用于分布式数字资产中，以证明隐藏在承诺中的值的平衡，同时保持签名者模糊性。先前的工作描述了一种签名者模糊的零知识证明，用于证明在多个公共承诺集中的相同索引处打开到零的承诺，以及用作链接标签的可验证随机函数的评估，并使用它来构建称为 Triptych 的可链接环签名，该签名可用作机密交易模型的构建块。在这项工作中，我们扩展了 Triptych 以构建 Arcturus，一种证明系统，该系统证明了在单个集合内打开多个承诺到零、在每次打开时正确构造可验证随机函数的评估，以及在单个证明内跨单独的承诺列表的值平衡。虽然可靠性取决于新颖的双离散对数硬度假设，但我们使用门罗币区块链的数据表明，Arcturus 可以在机密交易模型中使用，以提供比其他无需信任设置的最先进构造更快的总批量验证时间。
  cypherstack202410: 门罗币中临时交易的一致最强大检验
  cypherstack202410_abstract: 我们为具有小匿名集认证的交易协议（TPSASA）中的交易引入了一种通用的、低成本、低功耗统计测试，例如门罗币。该测试将交易分类为临时（自发构造以花费确定性选择的密钥）或自我混淆（从与默认钱包软件非常接近的概率分布构造，并且发送者和接收者相同）。该测试是 Neyman-Pearson 引理的一致最强大（UMP）似然比检验（LRT），不对用户行为做任何假设。我们将这些测试扩展到利用有关用户行为的先验信息。我们讨论了测试参数化，以及匿名集基数和用户行为如何影响测试性能。我们还描述了基于我们的测试对门罗币的最大似然去匿名化攻击。
  cryptonote: Cryptonote 白皮书
  cryptonote-whitepaper: Cryptonote 白皮书
  cryptonote-whitepaper_para: 这是 cryptonote 团队编写的原始 cryptonote 论文。阅读它将使您了解 cryptonote 算法的一般工作原理。
  annotated: 带注释的白皮书
  annotated_para: 门罗币研究实验室发布了 cryptonote 白皮书的带注释版本。这有点像对白皮书逐行提出的主张的非正式评论。它还用相对容易理解的术语解释了一些较难的概念。
  brandon: Brandon Goodell 的白皮书评论
  brandon_para: 本文是 MRL 研究员 Brandon Goodell 对原始 cryptonote 论文的正式评论。他深入研究了 cryptonote 论文中提出的主张和数学。
  libraryp: "资料库包含有用的文档，如'从零到门罗币'和'精通门罗币'，它们详细探索和解释门罗币。"
  librarybutton: 探索资料库

specs:
  title: 技术信息
  intro: 这里列出了一些关于门罗币的基本技术信息。有关更深入的细节，请查阅
  intro_link: 资料库
  intro1: 或联系社区
  pow_title: 工作量证明
  pow: 门罗币使用 @randomx，一种由门罗币社区成员创建的抗 ASIC 且对 CPU 友好的 POW 算法，旨在使使用特定挖矿硬件变得不可行。门罗币以前使用 CryptoNight 和此算法的变体
  pow_link: GitHub 仓库中的更多信息
  block_emission_title: 发行曲线
  block_emission_pre: "为了确保始终有挖掘门罗币并保持其安全的激励，发行是无限的。有两种主要发行："
  block_emission_main: "首先，主曲线：到 2022 年 5 月底约 1813.2 万枚币"
  block_emission_tail: "然后，尾部发行（每 2 分钟区块 0.6 XMR）在主发行完成后开始。这转化为 <1% 的通货膨胀率，随着时间的推移百分比趋向于 0"
  blocks_title: 区块
  blocks: 大约每 ~2 分钟创建一个新的 @block。没有最大区块大小，而是区块奖励惩罚和动态区块大小，以确保动态 @scalability
  privacytech_title: 主要隐私增强技术
  privacytech_ringct: "@RingCT"
  privacytech_sh: "@Stealth-Addresses"
  privacytech_rs: "@ring-signatures"
  privacytech_tor-i2p: 通过 Tor/I2P 的交易
  privacytech_dandelion: Dandelion++

library:
  description: "以下是一些可供您下载的出版物、书籍或杂志。"
  books: 书籍
  zerotomonerov2: "从零到门罗币：第二版"
  zerotomonerov2p: >
    发布日期：2020 年 4 月 4 日，<a href="https://github.com/UkoeHB/Monero-RCT-report">LaTeX 源代码在此</a><br>
    对门罗币的全面概念性（和技术性）解释。<br>
    我们努力教任何懂基本代数和简单计算机科学概念（如数字的"位表示"）的人不仅了解门罗币如何在深入和全面的层面上工作，而且了解密码学是多么有用和美丽。
  zerotomonerov2langs: 提供<a href="Zero-to-Monero-2-0-0-ru.pdf">俄语</a>、<a href="Zero-to-Monero-2-0-0-pt.pdf">葡萄牙语</a>和<a href="Zero-to-Monero-2-0-0-it.pdf">意大利语</a>版本。
  zerotomonerov1: "从零到门罗币：第一版"
  zerotomonerov1p: >
    发布日期：2018 年 6 月 26 日，<a href="https://github.com/UkoeHB/Monero-RCT-report">LaTeX 源代码在此</a>
  masteringmonerop: >
    一份引导您穿越看似复杂的门罗币世界的指南。<br>
    它包括：
    <ul><li>对区块链和隐私重要性的广泛介绍 - 非常适合非技术用户。</li>
    <li>对比特币缺点和门罗币提供的具体解决方案的讨论。</li>
    <li>用户故事（说明门罗币如何保护您的隐私）、类比、示例、法律/道德讨论和说明关键技术概念的代码片段。</li>
    <li>门罗币去中心化网络、点对点架构、交易生命周期和安全原则的详细信息。</li>
    <li>面向开发人员、工程师、软件架构师和好奇用户的门罗币技术基础介绍。</li>
    <li>新发展，如 Kovri、Bulletproofs、多重签名、硬件钱包等。</li></ul>
  cheatsheets: 速查表
  thesalmonseries: "三文鱼系列"
  thesalmonseriesp: >
    处理门罗币内部工作原理的信息图。名称来自采用的颜色，具有语义含义（即使很弱）但也具有统一功能作为重复主题，在作者眼中类似于三文鱼褐变（从生到熟）:)
  moneroaddressescheatsheet20201206: "门罗币地址速查表"
  moneroaddressescheatsheet20201206p: >
    在"大局"和数学细节之间，各种密钥、地址、范围（私有/公有、花费/查看、链上/链下、付款人/收款人）及其关系的单页回顾。
  ringscheatsheet20210301: "环速查表"
  ringscheatsheet20210301p: >
    从通用传统签名到 CLSAG，通过环口味的视觉之旅，在海报大小的信息图中逐步呈现其核心属性。
  rctcheatsheet20210604: "RingCT 速查表"
  rctcheatsheet20210604p: >
    美味的 RingCT Type 5 交易配方：每十一个 UTXO 一个 CLSAG，按口味添加门罗币金额；用 Pedersen 承诺加厚一切，其整体平衡对服务员也是显而易见的，并用 BulletProof 釉料保护最后的承诺；在选定的隐身地址上食用，并在十个区块后才消费。干杯！
  zkbasicscheatsheet20220621: "ZK 基础速查表"
  zkbasicscheatsheet20220621p: >
    一个轻度理论性的插曲（希望仍然温和，试图强调概念而不是形式主义并选择接近的主题），为 Bulletproof 和其他未来的零知识相关功能（如果有的话）奠定基础。
  newsletters: 时事通讯
  revuomonero: >
    Revuo Monero 是一份每周时事通讯，您可以在其中找到最新的门罗币新闻。
  themonerostandard: >
    Monero Standard 是 recanman 的每周出版物，提供有关门罗币协议的最新新闻和信息。
    除了涵盖门罗币社区的最新发展外，The Monero Standard 还包括每周价格图表、挖矿池图表、区块链统计数据，甚至每周一个 Meme。
  moneroobserverblitz: >
    Monero Observer Blitz 提供门罗币社区和协议最新发展的月度更新。
    由 escapethe3RA 撰写，本出版物涵盖与门罗币持续开发、社区活动和该领域内显著成就相关的新闻。
  moneroobserver: >
    由 escapethe3ra 创建的独立资源，Monero Observer 提供门罗币最新发展的每日报道。它还提供广泛的资源、实用指南和每周或每月亮点，帮助社区保持最新。
  twim: >
    来自门罗币生态系统的每周见解和更新。随时了解私人数字货币世界的最新发展、新闻和分析。

